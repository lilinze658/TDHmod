 KR_welcome_splash_tab_3_content: "§Y请注意如下几项提示：§!\n£white_dot \n£white_dot \n£white_dot \n\n£white_dot \n\n£white_dot \n\n£white_dot \n\n§Y报告问题：§!\n此模组仍在开发中，所以可能会出现bug或者游戏崩溃。如果您发现了任何问题，请去我们的§YGitHub问题收集页面§!报告，以便我们更快地修复它们。您可以在暂停菜单中找到这个页面的链接。"
 KR_welcome_splash_tab_3_content_0: "Kaiserreich对§R早战§!、§R阵营§!和§R自治度等级§!等外交内容进行了限制。\nKaiserreich使用§C部队限制§!和§C解除动员§!机制来改善游戏后期的游玩体验。\n在§Y和平会议§!期间，请一定要吞并所有能吞并的地区，随后您可以通过§C决议§!释放被吞并地区中可释放的国家。\n您可以在§Y自定义游戏规则§!设置菜单中设置§C国家路线§!、开启或关闭§C玩家主导和平会议§!和§C地区&国家移交工具§!。\n您可以点击右上方的相应图标来打开£kr_options_icon §Y游戏内设置菜单§!，调整§C新闻事件显示频率§!，以及开启或关闭地区和胜利点的§C动态命名§!。\n您可以随时点击£help_button 图标来再次打开§Y这个窗口§!。"
