KIA_39_tt:"我们已经统一了§Y南方§!！"
KIA_laike:"测试国策"
KIA_laike_desc:""
ZET_error:""
ZET_error_buff:""
ZET_error_buff_desc:"我们无法得知该将领的任何消息，甚至连她叫什么都不知道，但有一点可以肯定，她愿意帮助我们，这就足够了。"
ZET_vertin:""
ZET_vertin_name:""
KIA.ver1.t:"秒"
KIA.ver1.d:"我闻到了和暴雨前夜相同的水腥气。矿场探照灯扫过砂岩峡谷，汉娜的剪影突然出现在巨型输水管顶端。\n\n"他们在矿井里埋了五吨硝酸铵。"她抛来半张被盐酸腐蚀的蓝图，坐标点用采矿队的血画着圈，"但集团军不知道，爆破专家上个月被他们吊死在绞架上。"\n\n我们趴在干涸的引水渠里，她用刺刀尖划开沙地。当巡逻队的马蹄声经过时，刀尖正好完成整个矿区管网的测绘——所有通风井都连接着地下军火库。\n\n"你穿越十二个时区就为当旁观者？"汉娜把起爆器零件塞进我口袋，铜质部件还带着人体温度，"今早被处决的女孩口袋里也有块停摆的怀表。"\n\n三百米外的储水站突然发生爆炸，这是她给我的选择题。要么跟着溃散的守卫冲进控制室修改输水管线路，要么等着看两千名矿工在黎明前渴死。\n\n怀表的齿轮突然开始逆向转动，汉娜嘴角终于有裂纹，这次是真正意义上的微笑。"
KIA.ver1.o.1:""
KIA.ver2.t:"分"
KIA.ver2.d:"汉娜用刺刀在砂岩上划出三道交错线，矿工们立即分成三组拆卸铁轨。我按住被硝酸铵腐蚀的计时器，看着怀表指针滑向爆破临界点。\n\n"A组去二号通风井。"她对着野战电话喊，声音混着柴油机的爆震，"让装甲列车经过第三信号灯再引爆。"\n\n十七名少女猫腰穿过输水管阴影，他们背包里的雷管用防水布裹了三层。我在等高线地图上标记出四个狙击点，突然听见扳道工的哨音——比预定时间早了四分钟。\n\n汉娜夺过步枪，朝储油罐顶端射击。子弹擦过生锈的钢板，反弹到三公里外的信号塔，正好击中集团军少校的望远镜。这枪声成为总攻信号。\n\n矿工们同时拉动十二条引线，硝酸铵的白色烟雾从矿井通风口喷出，却在半空凝结成酸雨云。装甲列车在急刹中脱轨，撞进我们事先挖空的石膏矿坑。\n\n"现在。"汉娜把染血的铁路时刻表拍在桌上，"该让他们的输水管喝点硝化甘油了。"\n\n我旋开六个压力阀中的第三个，这是唯一连接地下暗河的枢纽。远处精炼厂的爆炸声传来时，怀表终于恢复顺时针转动。"
KIA.ver2.o.1:""
KIA.ver3.t:"时"
KIA.ver3.d:"她擦拭枪管时，怀表齿轮卡着半颗铅弹。汉娜用刺刀尖挑起我的表链，月光在蓝钢表壳上刻出十字星痕。\n\n枪托抵着她锁骨淤青，"能做出误差不超过十秒的计时器。"她突然翻转刀刃，刀背压住我调整表冠的手指，"但我们需要的是误差不超过十米的死亡。"\n\n沙尘从帐篷缝隙漏进来，在煤油灯下形成金色旋涡。汉娜抽出集团军上校的镀金怀表，两枚表盘同时摆在弹药箱上。她的表针永远停在那一时刻，我的则卡在暴雨来临前的潮汐周期。\n\n"当个现代堂吉诃德吧。"她把爆破线路图插进我表链，"用你的精密齿轮，对着风车般的装甲列车冲锋。"\n\n我凝视着两份时差七年的刻度，直到柴油机噪音吞没所有犹豫。当她用枪油帮我的表芯除锈时，远处正好传来轨道探伤车的汽笛。\n\n"为每个停摆的黎明。"汉娜将改造过的撞针零件推入表壳，"至少让这座绞肉机走得准些。"\n\n我们握手时，两颗怀表的齿轮同时发出生涩的咬合声。"
KIA.ver3.o.1:""
KIA.ver4.t:"日"
KIA.ver4.d:"我的怀表盖嵌入砂岩时，整条矿脉开始随齿轮频率共振。十七个战场电台同时传出机械咬合声，四万六千名军人沿着发条状战壕向十一座集团要塞推进。\n\n装甲列车在铁轨上犁出火星，我转动表冠调整铁路探伤车的巡查频率。当秒针划过第七刻度时，六条主干道同时发生枕木位移，十二列军火运输车在沙漠峡谷连环相撞。冲天火光中，硝酸铵烟雾沿着擒纵轮结构的通风井灌入地下堡垒。\n\n两百公里外的矿石精炼厂最先升起红色信号弹，工人们用雷管爆破冷却塔。我对照等高线地图旋转表冠，爆破冲击波恰好沿着地质断层传导，六座集团军油库在四分钟内接连殉爆。黑色烟柱在夜空交织成齿轮状的阴云。\n\n黎明前的地震让局势彻底失控。我砸碎表壳取出主发条，将淬火钢芯埋进主矿脉裂隙。当集团军重炮部队开始齐射时，整片沙漠突然发出机械运转的轰鸣——三百米厚的砂岩层开始顺时针旋转，将四十七辆坦克吞入地壳咬合带。\n\n月光下，矿工们用铁轨拼出直径两公里的怀表图腾。我在中央控制台插入半截撞针，所有改造过的步枪同时响起上膛声。当秒针最后一次跳动时，五千吨地下暗河冲破岩层，裹挟着星形铁矿砂扑向最后的集团要塞。"
KIA.ver4.o.1:""
KIA.ver5.t:"周"
KIA.ver5.d:"弹巢空了的步枪开始发烫，我趴在逆时针旋转的砂岩层上，看着怀表裂纹里渗出的地下水把地图染成深蓝。四万六千人的心跳正通过铁轨传来，和齿轮咬合声在三百米深的地壳处共振。\n\n军人们用淬火钢轨拼出的怀表图腾开始渗水，这原本该是总攻信号。但我摸到了大衣夹层里的星象图——暴雨前夜绘制的十二组坐标正在发烫。只需将怀表齿轮卡进赤铁矿脉的晶格缺口，就能打开回归的时空裂隙。\n\n沙尘暴突然改变方向，集团军要塞的探照灯在酸雨云里晕成光斑。爆破手们正在等我挥动信号旗，他们用硝酸铵在石膏矿层炸出的环状坑，恰好构成怀表内部行星齿轮的拓扑结构。只要再修正七度角，冲击波就能沿着磁铁矿脉直抵核心反应堆。\n\n我把星象图一角塞进岩缝，图纸立刻被含铁地下水染出血色。精炼厂爆炸的火光中，那些用雷管引线标注的爆破点，与归途坐标在等高线地图上完美重叠。每个矿工都在此刻成为我表盘上的一个刻度，他们的命运用齿轮传动比写在我的战术手册里。\n\n酸雨开始腐蚀表壳上的铭文时，我把半张星象图折成信号旗。当六十吨硝酸铵同时引爆，夜空将出现持续十三秒的类星体闪光——足够两个世界的人同时许愿。"
KIA.ver5.o.1:""
KIA.ver6.t:"停转的指针"
KIA.ver6.d:"我把爆破坐标刻在怀表内侧时，汉娜正用刺刀给步枪校正准星。沙尘暴掀翻临时指挥所的帆布顶棚，露出正在塌陷的集团军要塞。\n\n"赤铁矿脉的晶格缺口在B3区。"我将星象图摊在弹药箱上，酸雨把墨迹晕染成血泊的形状，"下次月圆时，把六吨硝酸铵埋进磁偏角28度的位置。"\n\n汉娜抽出弹匣里的哑弹，用弹壳在图纸边缘敲出摩尔斯电码："这是你们基金会测算的误差范围？"她突然用枪管挑起我的表链，"还是你给自己预留的逃生通道？"\n\n两公里外的矿坑发生二次坍塌，我们同时扑向掩体后方。崩落的岩层在怀表玻璃面投下倒计时阴影，汉娜突然把步枪支架卡进我的表链齿轮。\n\n"上次穿越者留下半本《地质力学》。"她拉动枪栓，黄铜弹壳精准掉进我标注的爆破点，"他在最后一页写着——每个世界都需要自己的堂吉诃德。"\n\n我把改造过的撞针零件推进表冠，三百米砂岩层开始顺时针旋转。汉娜突然用刺刀斩断表链，半截齿轮飞进正在合拢的地裂。\n\n"告诉你们基金会的老古董——"她迎着装甲列车的探照灯站起来，"沙洲的骑士用铁轨当长矛就够了。"\n\n我扣动怀表扳机的瞬间，她对着夜空打出三发信号弹。所有起义军突然调转枪口，为时空裂隙的蓝光构筑起环形防线。\n\n当酸雨开始溶解铭文时，我最后看到的画面是汉娜背对我挥动刺刀，刀尖正指向月全食的红色缺口。"
KIA.ver6.o.1:"回去吧，我终究不是这个世界的人"
