  CountryInfo_Economic_Overview_GER: "Econ broke"
  CountryInfo_Economic_Overview_ITA: "As 1962 begins, the §YItalian Empire§! finds itself in a difficult situation.\n\nItaly's §Ycorporatist§! economy, while undoubtedly more lively than the twitching corpse that is the §rGerman§! one after the market crash of the Fifties, is plagued by §Robsolete§! production methods, §Rlack§! of private investment, as well as §Rcorruption§! and §Rcronyism§! in the supervision organs. Unemployment is on the rise, and while the oil from the Gulf fields maintains the budget afloat, and allows Italy to afford massive subsidization programs, public debt grows at an §Ralarming rate§!."
  CountryInfo_Economic_Overview_IRE: "Ireland's Economy is that of a Free Market Economy§!. This is a system where corporate enterprise is allowed to run with either no or few checks from the Government. Depending on the government, this system will have varying amounts of regulation ensuring that corporations are kept in check. More importantly for Ireland, it is a Bündnispartner. The Irish Economy has a series of ties with that of the Reich. With German mistreatment of Irish workers in factories, the influence that the Reich has over Ireland is getting more strained by the day. However, German influence also has meant investment. The §pAufsichtsrat der Wehrwirtschaftsführer in Irland§! - or just the Adwil - is the main board in charge of German investment in Ireland, also being Germany's main mode of influencing the Economy. One one hand, the Adwil is a "free" source of funds, which Ireland can use to fund national projects. On the other, displease the investors too much and they may pull out, leaving us destitute."
  CountryInfo_Economic_Overview_IBR: "Iberia's Economy operates on the principles of Dirigisme - a system where the state is the unchecked maestro of the economy it benefits from. In this case, Iberia is responsible for building and managing it's projects using quotas and forecasts alongside deep co-operation with the many corporations that make up the state.\n\nAgriculture is in shambles, due to the stagnation that the repression has caused. Much of the population still toils in the countryside, which hurts industrialisation. Conditions in the rural areas are varied, however the poorest areas suffer from crippling poverty and lack of basic, governmental services. Spain serves as the Industrial Heartland of the Union, with most corporations being in Madrid's orbit. However, Portugal still remains as the main heart of global trade, although it's a role that has diminished in importance with Iberia's retreat from the Globe."

  CountryInfo_Economic_Overview_JAP: "The Empire of Japan operates under the principle of §hDirigisme§!. This principle - literally to "direct" - is a state of development where the government enforces its will upon the free market and directs the players inside it to bend to its will. This isn't to say that it is a planned economy, like the sort that Stalin envisioned inside the former §VSoviet Union§!, because the private sector is as important - if not more - to the Dirigisme Economy compared to a Free Market State.\n\nIn Japan, this has led to the rise of the §KZaibatsu§! such as §xMitsubishi§! - near-dynastic corporations that control vertical monopolies over huge sectors of the economy - taking prominence inside the economy, with considerable influence. In return, alliances of "small" businesses in Japan have formed loose alliances called the §dKeiretsus§! to combat the Zaibatsu's rampant control of the economy."

  CountryInfo_Economic_Overview_ENG: "The Kingdom of England is a §KFree Market Economy§!, where corporations are allowed to do most of their activities and business with very few to no regulations. While the level of regulation differs from nation to nation and government to government, it is generally much more laissez-faire.\n\nIn England's case, it's economy has remained mostly intact from the pre-Occupation days. However, the biggest issue in the English economic sphere is §Orebuilding§! what is left. During the Second World War, England was subject to the largest strategic bombing campaign - called §YThe Blitz§! - in European History, with Luftwaffe planes leaving very little English industry untouched. The lack of significant reconstruction has led to even more §4resentment§! towards the government and high levels of unemployment inside England."

  CountryInfo_Economic_Overview_SVR: "Sverdlovsk operates under the §gMilitary-Directed Economic§! model. This is a model where the military, due to its §gunchecked grip§! on the state, has the ability to completely command and direct the economy. It is not a command economy similar to that in the former §VSoviet Union§!, because private enterprise is allowed to exist in the state, but the military regime has the §Rfinal say§! over all directives inside the nation.\n\nIn Sverdlovsk's case, the military regime commands what is left of the industry that was moved west by §CBukharin§! and §eStalin§! into the Siberian plains, and was not damaged during the §LLuftwaffe Terror Bombings§! in the 50's and 60's. Compared to other states, it still has a fairly hefty industry and is able to project economic power further than the other warlord states."
  #- Place Economic Overviews here -#
    
  ##Guangdong
  CountryInfo_Economic_Overview_GNG: "§RGuangdong's economy§! operates as a §RCorporate Oligarchy§! - a polity where both the economic and political spheres have been subsumed under the direction of large corporations, in this case the §YFour Companies§! of §YYasuda§!, §VSony§!, §YMatsushita§!, and §OFujitsu§!.\n\nSocial and labor protections are intentionally kept weak - weaker than on the §OHome Islands§! themselves - to enable the maximization of profit, with the Four Companies given essentially free reign to do as they please. While Guangdong maintains the minimum necessary to maintain the pretense of a functional government, the withering away of the state has afforded even more opportunities for §Rcorruption§! or §Ycorporate interests§! to insert themselves into public life.\n\nGuangdong's economic performance is also intimately tied to the §Oelectronics product cycle§! - a competition to win the hearts and wallets of consumers with the §Kbest product§! at the §Kcheapest price§!."

  CountryInfo_Economic_Overview_GRO: "Reichskommissariat Ostafrika's Economy is that of the §oGelenkte Wirtschaft§! model. This model tries to balance between the command economy of the former §RSoviet Union§! and the free market capitalism of the §YUnited States of America§! by combining a use of state-directed initiatives and cooperation with private enterprise and selecting a few trusted and proven corporations to serve the state in a fashion that suits both parties.\n\nIn §OOstafrika§!'s case, the state runs on African branches and subsidiaries of German corporations within Europe. However, it is most similar to §EBurgundy§! in the fact that it heavily relies on slave labour and an incredibly repressed underclass to serve the §rselect few§! chosen inside the colony, that can barely eek out a living themselves in the harsh conditions of Eastern Africa."

  CountryInfo_Economic_Overview_ANG: "Reichskommissariat Südwestafrika's Economy is that of the §oGelenkte Wirtschaft§! model. This model tries to balance between the command economy of the former §RSoviet Union§! and the free market capitalism of the §YUnited States of America§! by combining a use of state-directed initiatives and cooperation with private enterprise and selecting a few trusted and proven corporations to serve the state in a fashion that suits both parties.\n\nHowever, §OSüdwestafrika§!'s economy doesn't so much pretend to Germanise what parts of the colony it fully controls, but is more content to waste it's money on building Luftwaffe infrastructure inside Namibia, trying to justify it by pointing to the §OSouth African§! powderkeg. In reality, it's Luftwaffe officials pocketing the cash for themselves and going on half-hearted missions to prove that they deserve the funding more than the rest."

  CountryInfo_Economic_Overview_COG: "Reichskommissariat Zentralafrika's Economy is that of the §oGelenkte Wirtschaft§! model. This model tries to balance between the command economy of the former §RSoviet Union§! and the free market capitalism of the §YUnited States of America§! by combining a use of state-directed initiatives and cooperation with private enterprise and selecting a few trusted and proven corporations to serve the state in a fashion that suits both parties.\n\nThe reality on the ground is that Zentralafrika is run more like Müller's §ysweetshop§! than anything else. The entire colony is littered with shell companies of Western and other §oforeign-based corporations§! who pay Müller a hefty fee to sap what resources haven't been drowned by the §4Congo Lake§! - with the Reichskommissar away to hunt down big game and leaving the economic paperwork to his underlings."

