 haishijujuzhang:"海事局局长"
 ZET_dantuku_desc: "外贸部部长卡妮负责秩序护卫，长期与军人和教士厮混，与安保防卫部部长丹·兔库颇为亲密。看似与她的身份不符，但这与她的圣骑士出身有关（卡妮是黄昏圣国的圣骑士，因理念不合被人陷害与亡灵为伍被迫外逃，而兔库在她将要被带回审判时将她救下，两人因此成为密友，其他人并不知道两人关系）"
 ZET_hanwufa_desc: "财政部部长韩舞阀长期避着卡妮走，传言说韩舞阀与卡妮曾有过一段孽缘，但事实上韩舞阀只是单纯的对卡妮身上的气息感到不适，她曾在公开场合说过她只是厌恶卡妮的神圣气息（韩舞阀是神州鬼族，一家人在阳洁羽一案中受牵连外逃，在交界洋上被追捕异教徒的黄昏教国舰队误伤，一家七口仅剩韩舞阀一只独苗，两人算间接死仇，但韩舞阀并没有追究卡妮责任的想法，毕竟都不是同一批人）"
 ZET_was_assassinated: "织田良下川总裁遇刺" 
 ZET.1.t: "总裁遇刺！" 
 ZET.1.d: "今日，在我们的总部大楼前，在我们的护卫警诫中，在我们的眼皮子底下，织田良下川总裁遭遇刺杀！我们封锁了每一条路，对所有群众进行必要的审查，但还是让该死的刺客抓住了机会！\n\n一名虎种女人翻越栏杆，冲出警戒线，直直冲向总裁专车，我们试图去拦截，但她竟然用枪袭击了我们！\n\n我们击飞了她的枪，并立即击毙了她，但这个该死的亚人身上竟然绑满了炸药！刺客临死按下了起爆器，月华炸药剧烈反应，在闪光的一瞬间摧毁了街道，总裁专车高高飞起，砸在地面上。\n\n我们在最短时间内救出总裁并立即送往医院。可惜的是，良下川总裁最终因烧伤与内脏破损，抢救无效而去世。这次事件震动了整个集团，原本在良下川总裁的领导下团结一心的各部门立即四分五裂，部长们近乎疯狂地为自己的派系谋取利益。南方不安分的工人们又一次躁动了起来，她们第一次在与我们的斗争中使用了致命武器！" 
 ZET.1.a: "该死，混乱到底什么时候终止！" 
 ZET.1.b: "有趣……" 
