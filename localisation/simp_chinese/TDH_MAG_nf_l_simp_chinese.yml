  #决议GUI
 MAG_linghun_decision_category: "§9灵魂炉火§!"
 MAG_linghun_decision_category_desc: "[GETMAGlinghunluhuojieshao]\n\n核心:[GETMAGlinghunluhuohexin]\n外壳:[GETMAGlinghunluhuowaike]\n底座:[GETMAGlinghunluhuodizuo]"
 MAG_linghuoluhuo_jieshaowu_1: "§9灵魂炉火§!作为旧日爱神的遗留造物，是魔法少女整个种族的生存核心，也是整个大陆魔力的来源核心。\n  爱神曾亲手点燃了这座奇观，炉火迸发出的灵魂烈焰短短几日便将魔力放射到全大陆乃至整个德颂拉特，并为魔法少女接续上了一条永恒的生命线。在曾经爱神尚存的时代，魔法少女从未忧虑过§9灵魂炉火§!的熄灭，无私的爱神用自己的神力维系着炉火不熄，但随着万年前魔法少女对自己神明的背叛，爱神陨落，失去神力维系的§9灵魂炉火§!开始熄灭，曾经闪耀着璀璨光芒的轮盘也爬上了无数锈迹。\n  作为几乎完全由魔力构成的种族，§9灵魂炉火§!的熄灭将是灾难性的，这不仅意味着整个德颂拉特范围内的魔力退散，更意味着自身种族存在的消亡。所幸，§9灵魂炉火§!的熄灭是一个极其漫长的过程，魔法少女们为了自身存在的延续，将活动的范围一步步限制到仅限于北西洲地区这一炉火最低影响范围内，在此期间魔法少女做了两手准备，一方面全面修改§9灵魂炉火§!的结构，使其可以被非神物体点燃，另一方面协助其他种族创造了大量的次生魔力衍生核心，维系着世界的魔力含量。\n  作为起源的§9灵魂炉火§!经历改造之后，将燃料的范围从仅限神性物体扩大到含充沛高能魔力物体，以一种极度唯心的方式生成出数倍于投入量的魔力。因此，魔法少女衍生出了新的种族传统：所有无力拯救的濒死少女、犯下重大过错的少女、月狂少女、高能月华聚合体和敌人都将被投入到炉火之中作为燃料。\n  时至今日，衰落而又复兴的魔法少女重返她们的家园，夺回了象征着种族存亡的§9灵魂炉火§!，正如旧日每一位开创新朝的魔法少女领袖一样，奈尔嘉德——新的法兰领袖计划着对§9灵魂炉火§!进行改造，将核心、外壳和基底进行改良与替换。\n  每一次对于§9灵魂炉火§!的改造都决定着魔法少女国度的国运，而对作为神明造物的§9灵魂炉火§!进行的每一次改造都会随着时间流逝而失效被同化。现在摆在奈尔嘉德面前的就是已经再度恢复原始模样的§9灵魂炉火§!，任凭她肆意改造。"
