 mag.1.t:0"法兰复国战争"千年来我们流离失所 百年来我们背井离乡 在长达百年的谋划中我们已经做好复国的准备
 mag.1.d:0" 魔法少女同盟会在4634年初发动复国战争,哈斯佩芙没有做好战争准备"
 mag.1.a:0"我们要复国"我们受够了被无休止的狩猎 受够了东躲西藏的生活 我们需要一个家园
 MAG_STWAM1_tt:0 "魔法少女同盟会获得一些部队"一些魔法少女决意加入我们 为伟大目标而奋斗
 mag.1.d:0"这是个机会"机不可失 现在是光复祖国的最佳时机
 mag.1.b:0"我们根本没有做好准备"复国不是小事 我们仍然需要谋划
 SHE_STWAM1_tt:0 "第一先遣军登陆波萨利亚"
 mag.1.c:0"无关紧要"
 mag.2.t:0"法兰复国"经历冰雪 国家光复 原法兰王国国祚永延
 mag.2.d:0" 哈斯佩芙在魔法少女同盟会和升阳打击中最终谈判"
 mag.2.a:0"我们胜利的"
 mag.2.b:0"这个结果还不错"
 mag.2.g:0"可恶"
 mag.2.c:0"意料之中"
 mag.3.t:0"是否与升阳合作"我们势力仍然弱小 考虑外援事宜逐渐提上日程
 mag.3.d:0"升阳并非合作的最优之选 其心狼子 需以提防"
 mag.3.a:0"可以合作"升阳虽包藏二心但光复之事 尤为重要 我们可以与他合作
 mag.3.b:0"风险太大还是算了"此乃引狼入室 合作之事绝无可能
 mag.4.t:0"魔法少女同盟会希望合作"
 mag.4.d:0"经过商议认为这是一个机会"
 mag.4.a:0"同意"
 mag.4.b:0"拒绝"
 mag.5.t:0"升阳同意"
 mag.5.d:0""
 mag.5.a:0"那挺好"
 mag.6.t:0"升阳拒绝"
 mag.6.d:0""
 mag.6.a:0"真是可惜"
 mag.7.t:0"来自魔法少女的请求"
 mag.7.d:0"魔法少女同盟会要复国希望能得到我们的支持"
 mag.7.a:0"或许可以"
 mag.7.c:0"这个似乎不重要"
 mag.8.t:0"奇恩同意"
 mag.8.d:0"奇恩会给一些支持"
 mag.8.a:0"这还不错"
 mag.9.t:0"奇恩不在意"
 mag.9.d:0"奇恩不会参与"
 mag.9.a:0"或许可以"
 
 
