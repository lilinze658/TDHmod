 MAG_linghunluhuo_core_1_desc: "斗争的血脉流淌在每一位少女的身体里，少女们渴望的不再是和平，而是战争，荣耀与浴血的战争。"
 MAG_linghunluhuo_core_2_desc: "新生的下一代是种族的未来，一都应该为种族下一代的发展而让步，以便延续我们伟大的种族。"
 MAG_linghunluhuo_core_3_desc: "不屈的怒火永恒的灼烧着少女的心，对侵略的憎恨让每一位少女化身海浪，前仆后继的冲击一切仇敌。"
 MAG_linghunluhuo_core_4_desc: "领袖的眼眸激励着祖国的少女，为国奉献生产建设成为了所有少女战士最高的追求。"
 MAG_linghunluhuo_enclosure_1_desc: "少女的手抓住了天上的日月，革命的刀剑挥舞向外族的国度，只有通天的力量才能让少女于世间生存。"
 MAG_linghunluhuo_enclosure_2_desc: "生存的希望只存于祖国怀抱，发展与进步都需要内部的安全平稳，少女的枪不会对准背后。"
 MAG_linghunluhuo_enclosure_3_desc: "多如繁星的战士组成了族群的先锋盾，每一只手都相互勾连，构成文明、国家与种族不破的高墙。"
 MAG_linghunluhuo_enclosure_4_desc: "领袖的披风遮蔽着敌人的目光，让文明有着安全而充分的发展时间，协同万民供给国家。"
 MAG_linghunluhuo_base_1_desc: "燃烧的意志将狂热传染到每一个角落，决死战斗带来愉悦，崇高地位维系信念，野火绝不停熄。"
 MAG_linghunluhuo_base_2_desc: "笔杆子不是唯一的武器，枪与炮同样是，只有如严父般坚强的臂膀才能铸就少女的天国。"
 MAG_linghunluhuo_base_3_desc: "意志是坚不可摧的钢铁，没有任何事物能够动摇或击败坚定的战士，她们决不后退一步。"
 MAG_linghunluhuo_base_4_desc: "领袖的意志决定着国度的方向，把舵之人绝不会走上错误的路线，让少女们自由的经济腾飞吧。"
 MAG_linghunluhuo_dy: "§9灵魂炉火§!"
