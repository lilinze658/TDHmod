 SHE_administrative_efficiency: "帝国政府"
 SHE_administrative_efficiency_desc: "“如今的升阳政府中有多少神州特工或者是同情者？”这种问法显然是不对的。正确的问法应该是“有多少不是”。"
 SHE_resistance_of_aborigine: "原住民的反抗"
 SHE_resistance_of_aborigine_mtt: "§R在我们彻底§Y驯服§!或§Y消灭§!这些野蛮人之前，她们不会停止对我们的破坏§!"
 SHE_not_acclimatized: "水土不服"
 SHE_not_acclimatized_desc: "从一个大陆国家转型为一个海洋国家是相当不容易的，虽然我们在离开神州时带走了帝国东疆庞大的舰队以支撑起现如今我们的海防体系，但是潜在的威胁不仅仅来自于同类，大自然母亲也在用她的力量考验着我们，面对诸如台风、地震等多发的自然现象，我们面前有两条路可以走：建立完善的预警体系，并且对周围的大陆架进行改造；亦或是探索海岛上古老的遗迹，相信前人的智慧。"
 SHE_industry_improve: "升阳工业体系"
 SHE_industry_improve_desc: "“空中楼阁”这句话形容如今我们的工业是最恰当不过的。我们能够造出大舰巨炮，却对基本的枪械弹药的改进无能为力；我们能够组装最先进的坦克，却几乎对桌椅板凳和茶碗茶壶无能为力。\n\n§R这不是一个正常国家应有的工业体系。§!"
