 industrial_1:0 "乌合之众"
 industrial_1_desc:0 "以民兵为基础的松散组织结构，指挥官通过血缘或地缘关系任命，缺乏统一军服与标识体系，战术层面仅限于人海冲锋与掠夺式就地补给。"
 industrial_2:0 "纪律雏形"
 industrial_2_desc:0 "形成常备军框架并建立基础军衔制度，配备简易新兵训练体系，掌握方阵部署与拒马防御等基础战术，开始采用标准化武器制式。"
 industrial_3:0 "战术精锐"
 industrial_3_desc:0 "通过军事学院培养职业军官团，工兵与侦察骑兵成为独立兵种，实现步兵、骑兵、炮兵的协同作战体系，配备基础野战医疗系统。"
 industrial_4:0 "战争艺术"
 industrial_4_desc:0 "建立陆海空立体化作战指挥链，战略欺骗部门与心理战专家嵌入参谋体系，具备大范围兵力投送能力。"
 
