 4636_NAME:0 "秩序战争（完成度0%）"
 4636_DESC:0 "过去的几年里，整个德颂拉特大陆在一种及其不安定而又微妙的气氛下度过，洛维尼亚内战的持续对峙，再一次崛起的莫比斯帝国，经过无数苦难艰辛最终终于建立自己国家的魔法少女们，终于将魔爪伸向大陆并获得丰硕战果的升阳帝国，以及在曾经被洛维尼亚。斯塔王国击败后，沦为了洛维尼亚的傀儡，在冲突最前线充当缓冲带，在两大强国夹缝的中艰难求生的新斯塔国。冲突无处不在，在前线，在国内，在政府内，在军中，在人所存在的每个角落，新兴的革命势力与守旧贵族的矛盾，渴望称霸的新兴帝国与老牌帝国的冲突，以及暗藏各处的机遇与危险。人类，亚人，魔法少女，德颂拉特的大陆上的每个民族，种族，国家，团体在摇摇欲坠的世界中，稳定着独属于自己的风向标。"
 MOB_4636_DESC:0 "莫比斯经历了辉煌而又璀璨的历史，她们创造了文明与秩序，将新世界的希望寄托给了后人，让这个世界免于毁灭在战争与污染之中，并留下了肥沃的魔洲土地。不过，当虚弱而衰败的莫比斯经历十次莫洛战争后，十字女皇失去了她伤心河以北的广阔领土，连帝都夏普洛也在割让了瓦洛庞以后受到了洛维尼亚的威胁。再度复国的斯塔，像是贴在狮子脸上那滑稽的贴纸，玷污了莫比斯的荣耀，将莫比斯变成了一个笑话。“莫比斯必将夺回失去的一切，莫比斯必将让曾经的胜利者付出代价！”艾普蒂菲在就任帝国元首的演讲中，与薇莲二世一起，向帝国的每一位公民宣誓。莫比斯从未失败！莫比斯只是在等待一个向洛维尼亚复仇的机会！时至今日，沙洲的暴动、洛维尼亚的混乱与安息的窥探让莫比斯看到了这个机会，复仇之日已近！莫比斯之狼已将头从臂弯中抬起，铁血的目光凝视着伤心河的北岸。"
 LOV_4636_DESC:0 "洛维尼亚，一个伟大的多民族国家，世界不落的太阳，大陆最著名的礼仪之国，曾享受着泛大陆对她的供奉。她亲手塑造了世界的新秩序，也必将灭亡于她建立的秩序。自奇恩帝国独立之时起，曾经能驱逐翼神教、放逐魔族佬、打碎法兰军团的庞然大物，不可避免地滑向历史周期律的低谷。洛维尼亚再也不能轻易地掠夺他国的财富，再也不能随意地干涉他国的内政，再不见旧日的鼎盛之景。洛维尼亚已经不是那个洛维尼亚了，无论是贵族还是皇室，都再难出现一位能统领这个衰落国家的领袖。在无数矛盾堆积之下，布兰二十六世之死，彻底点燃了这个火药桶。洛维尼亚燃起了升腾的怒火。长期处于压迫下的亚人、失势的没落贵族、失去身份的平民，与新皇室联合，向贵族挥出屠刀。席卷全国的大起义，贵族与皇室的对峙分裂，窥视着皇位的安息魔王、意图复仇的教国、卷土重来的莫比斯……秩序协约正在崩溃，洛维尼亚这艘大船究竟会驶向何方？"
 WIM_4636_DESC:0 "当洛维尼亚人将羽翼一族赶到了荒芜的中洲时，当翼神的神迹在伊万尼娅显现时，当无数圣教徒在大教堂中目睹了“神使”的降临时，至圣伟大的翼神教国诞生了。全世界虔诚的信徒都纷纷涌向中洲，涌向教国，涌向伊万尼娅。为上古大战后满地疮痍的中洲大陆增添生机与活力，无数教徒在“神使”的指引下重建了中洲，除了“不服王化”的熔铁族裔和“不信圣主”的阿库娅之犬，中洲之地皆归于一统！不过，坐拥几乎整个中洲且军事实力并不强盛的教国成为了大国政治博弈的牺牲品。正处在上升期的洛维尼亚、短暂统一的被雄鹰特里克帝国和无言怒火的神州肢解了教国、分化了教义、扶植了傀儡，将大批流民迁徙到中洲，改变了人口结构，使得中洲之地支离破碎，过往荣光灰飞烟灭，后人只能从教典中一窥往昔，连神使真容都消亡在历史之中。现如今，翼神教国抓住了一个机会——在洛维尼亚衰落后，予以复仇的机会！中洲其余各国都是教国复兴的阻碍，无论是教义相近的邻国，还是南方的异教徒，都会倒在教国车轮之下！"
 RIE_4636_DESC:0 "“中洲只能有一个霸主，也只能由这个霸主主宰中洲，统一中洲，势必为之！”  军政府的宣传标语中，南方教的教义中，大学院的教育指南中，价值观的宣传中，“统一”与“主宰”是最常被提到的词汇，为什么里斯亚尼亚会如此的极端，穷兵黩武也要坚持下去？因为在每一位老一辈里斯亚尼亚人看来，亚尼亚民族在这片大陆上流亡的时间太久了，只有武力，强大到没有人会去质疑的武力，才能保护她们，才能让所有人闭嘴。于是乎，席拉军事改革与述沫尔斯的体制简化同步推进，将整个国家化为一台高速而简洁地运行着的机器，军费占比逐年上升，近十亿的人口供养着一支庞大的军队，集结在北方邻国的边境。不过，渴望征服与统一的只有亚尼亚民族，无论是其他族群还是遗留羽翼，没有多少支持北伐的。里斯亚尼亚军政府腐朽衰败的政权引起广大人民的不满，被征服的土地上的人民渴望着反抗，萧条的经济告诫着人们军政府的无能……神州注视着中洲，教国分裂着中洲，里斯的人民在哀嚎，里斯亚尼亚将在荆棘之路上远行，无论教国还是她的子民，都将挡在里斯亚尼亚的战车前。"
 DIV_4636_DESC:0 "在这片纷争的大地上，除了神州，没有哪个国家可以说自己有着悠久的历史，莫比斯不行，洛维尼亚不行，升阳更不行。五千五百年国祚，神州见证了众神的陨落；见证了八次大陆战争；见证了中洲的动乱；见证了法兰的解体……她，见证了太多太多的事，无论纷争还是联合，她都看在眼里，她像海边悬崖上矗立的灯塔，无欲无求，不争不抢，静静地看着世间。她如同屹立在世间的通天之山，任何意图动摇她、征服她的人都死在了登山的路上。如果一切顺利，神州还是会一如既往的发展……但是，阳洁羽，一个叛徒的出现，如投石落水一般，在神州这片死水湖中激起阵阵涟漪。她们占据了东国解体后荒废的升阳群岛，并意图再返神州，夺取皇位。本来没有人在乎这支渺小如蝼蚁的叛军残部，但当她们发掘出一座超古代枢纽时，神州的目光不可避免的投向她们，升阳的事务第一次摆上了朱秋的案几上。或许一支弱小的叛军不足为道，但如果她们有了威胁统治的力量呢？"
 SHE_4636_DESC:0 "“秦氏王朝已经走到了尽头，腐朽的神州需要变革！”原神州东卫定洋军统领阳洁羽如是说。在大叛乱失败以后，阳洁羽带领尚未被清算的旧部，在交界洋上建立了鬼族之国——升阳帝国。在原东国的废墟之上，阳洁羽将这个新生的岛国变为自己的复仇工具，穷兵黩武地发展军事，在神州的眼皮子底下积攒反攻的力量，恰在此时，一座超古代枢纽被发掘了出来。很显然，神州从未将她们放在眼里，那么，升阳在神州再次看向她们之前，有着充足的发展时间，足以让升阳“锻造”一把专门用于砍向神州的利刃。但仅凭岛上匮乏的资源，显然远远不够。于是，升阳将目光转向东方——大洋彼岸的西洲。波萨利亚与菲沃克公国，两个非常适合用作进攻掠夺西洲的跳板，进入了升阳的视线中。不过，阳洁羽很清楚，无论她们征服西洲的过程多么顺利，她们也绝不可能在西洲建立起长久而又稳定的统治，她们的目标从始至终只有一个：反攻神州。乱世将起，秩序战争的序幕已经拉开，升阳的时代将要到来！"
 TZY_4636_DESC:0 "原为洛维尼亚的西方殖民地，历经独立战争后成为法兰南部不可忽视的强大国家。目前正计划着吞并同属于洛维尼亚前殖民地的奇拉王国。"
 OTHER_GATHERING_STORM_DESC:0 "无论大国还是小国，这个世界上的国家并不都满足于屏声静气地等待着下一场全球冲突的爆发。从濒临内战边缘的大国到上次大战后才被组建或重塑的众多国家，都不得不在理想与现实之间作出艰难的取舍，而这一切都将对这个世界的未来产生影响。"
