 4633_NAME:0 "短暂的和平（完成度3%）"
 4633_DESC:0 "自上次洛莫战争结束后，艾普蒂菲已经巩固了权力，并将目光投向了莫比斯以外的地区。而升阳帝国也已蓄势待发准备进攻法兰地区和奇恩地区。自上次洛莫战争结束后，如今整个世界又一次被浸在了滚油当中，只需一点小小的火花就能将一切引燃。 "
 MOB_4633_DESC:0 "第十次洛莫战争结束，莫比斯惨败，薇莲二世在国内的巨大压力下退位，莫比斯的权柄交到了新兴领袖艾普蒂菲的手上。在新的元首艾普蒂洛的领导下大力发展 军工业和军队发展准备为第十次莫洛战争失败而复仇现在元首艾普蒂洛菲和军官团领导下莫卡斯帝国强大起来。莫比斯帝国是否可以打败维尼亚，建立属于莫比斯的世界秩序?"
 LOV_4633_DESC:0 "第十次洛莫战争胜利后，洛维尼亚获得瓦洛庞在内的大量领土。随着时间的推移，贵族与皇族予盾激化，亚人暴动日益严重，莫比斯渐渐崛起，在内忧外患洛维尼亚该如何选择？"
 TZY_4633_DESC:0 "经历过独立战争后，由莉莉玛莲家族为中心建立起的新生帝国。现在比优莱，尤利娅等人的对军队的改革使国家变的强盛。但是面对升日等国的崛起世界格局风云幻变，也许该做些什么，防止再次被洛维尼亚殖民。"
