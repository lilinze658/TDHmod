 ZET_ideas_99:"命中注定的内战"
 ZET.99.t:"沙克拉大革命"
 ZET.99.d:"不出所料，那些游击队终归还是成了气候，她们或剿灭或收编统一了商方的在野势力，她们甚至有了装甲部队，并对南方的多个矿场发起进攻！\n我们尝试去阻挡，但她们总能打穿我们的防线，我们的部队完全挡不住她们的攻势！这群养尊处优的老姊兵欺负欺负工人还行，去镇压武装部队还是太难为她们了。我们那些战力低下的安保部队难以承担清剿游击队的任务，只能放任她们壮大势力。\n随着沙克拉矿场工人暴动起义，工人革命彻底席卷整个南沙洲，工人领袖汉妮带领沙克拉的工人军与游击队的领袖亚伦蒂会合，在一名疑似来自莫比斯的军官辅佐下迅速夺取了包括菲唐德城与雷德特赫克城在内的南方大部分地区。\n忙于内斗的部长们立即意识到了情况的危急，调动普通部队已经没有用了，她们纷纷调动自己的私人部队，立刻稳定了失控的南方局势。\n现在这场大革命已经对集团的统治构成巨大的威胁，可我们又有什么办法呢？\n工人革命军甚至能和部长们的精锐私人军队打得有来有回，我们无能为力。"
 ZET.99.o.1:"还是避免不了命定的内战......"
 ZET.99.o.2:"还是走到了这一步......"