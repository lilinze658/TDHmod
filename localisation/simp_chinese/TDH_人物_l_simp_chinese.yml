     #白
 2_1_APDF_DES:0 "异界的来客，是布兰二十七世的异界同位体。从异界穿越来德颂拉特大陆的她和虚空恶魔签订了契约而被虚空恶魔附身，随着时间的推移渐渐熟悉了体内拥有两个灵魂的感觉，并可以使用虚空恶魔的力量。在布兰二十七世被赶下皇位后，她潜伏进皇宫将布兰二十七世救出并带她逃离洛维尼亚城。两人一路躲避追兵，最后将布兰二十七安全带给白城的布尔莉娅后继续进行她的旅程。" 
