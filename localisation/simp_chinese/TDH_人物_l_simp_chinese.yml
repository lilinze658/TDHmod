      #诗礼华
 11_1_APDF_DES:0 "一名乐观的古龙族流浪者，曾是经验丰富的铁匠，现在是优秀的武器设计师。法兰建国后与幽兰开始在帝国首都生活。作为流浪者工坊的元老之一，在战争期间为法军设计制造了数不胜数的优质武器装备。                                龙是德颂拉特的原始巨兽之一，而古龙更是其中最古老的存在，它们标志性的大角是许多收藏家梦寐以求的珍品。古龙在飞龙战争之前就已经销声匿迹，有人猜测它们被更加灵活的飞龙逐渐取代。作为其传承的古龙族更是三大龙族（古龙，盘龙，飞龙）中数量最稀少的族群。目前尚不清楚龙族的来历，有人认为她们与其他亚人类一样，属于原始生物接触魔力后演化的产物。也有人认为，龙具有变化自身形态的能力，为了更好融入人类社会，她们变化成与人类相似的形态来更好的生存下去。至于为什么变不回去了，可能是因为时间太长忘记了？" 
      #爱丽丝姬
 12_1_APDF_DES:0 "由莫比斯月华工程专家与洛维斯塔联盟工业部共同研发的第三代新型多用途机械助手，也是德颂拉特国际市场上最流行的型号之一，坚固又可靠，被多国政府机构、军队、企业和居民使用。最初的第一代爱丽丝姬原型是经过初级机械化改造的小爱丽丝，而第二代则使用月华处理器，并将小爱丽丝们的意识上传其中。第三代的爱丽丝姬已经不需要依赖小爱丽丝的帮助，只用经过简单的数据训练就可直接投入使用，这大大提升了爱丽丝姬的产量。没有什么是爱丽丝姬无法处理的，她们可以胜任各个领域的工作，包括但不限于：家务、娱乐、计算、烹饪、巡逻、保护、理发、顾问、治疗病患、处理纠纷、网络连接、工地建设、交通管制、搬运重物、小队作战、处刑犯人、军事战术规划、惩罚不听话的孩子、与恐怖分子谈判、从鸡蛋里挑出骨头、制作改造武器、提供国家建设思路等。另外，第三代爱丽丝姬使用核能驱动，在极端情况下可以使用核能协议——————妈的和你爆了（｀Δ´）！" 
 
 