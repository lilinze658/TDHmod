l_simp_chinese:
 LOV_bulanershiliushi:0 "布兰二十六世"
 #莫比斯
 #艾普蒂菲
 MOB_aipudifei_APDF_DESC:0 "莫比斯元首，人类。在考上莫比斯国家军事学院后成为年轻军官们的领袖并说服女皇薇莲二世主动退位，拥有极强的领导力，但至今仍然没有拿到军事学院的毕业证书。虽然能够与人正常交流，但除了她的秘书露米娅外没人能理解她想表达的那些复杂指令，写出来的正式文件晦涩难懂。“我花了一周的时间解密了元首写的毕业论文，真是太棒了，里面包含了年轻人特有的情感与格调，区别与其他那些充满形式主义的文章。虽然没有什么让人眼前一亮的修辞手法，但却有一种别具一格的内涵在里面。”——露米娅"
 #梅瑟兰蒂
 MOB_1_APDF_DESC:0 "莫比斯科研主管，人类。负责莫比斯多个方面的科研项目，包括但不限于机械义体改造工程，月华动力运用，基因工程等。"
  #茜拉
 MOB_2_APDF_DESC:0 "莫比斯海军指挥官，帝国第二任国家元首，人类。出生于莫比斯某个古老的落魄家族，与元首是同校同年级的学生，毕业于莫比斯军事学院，擅长潜艇设计与作战。"
  #纳姆蕾特
 MOB_3_APDF_DESC:0 "莫比斯将领，义体人。薇莲二世统治时期就服役的老将领，在第十次莫洛战争中失去了双腿，落得终身残疾，但在莫比斯的新技术下获得了新的身躯。这让纳姆蕾特能够适应恶劣的战场环境，针对这项优势给予她的启发，她开始训练一批擅长特种作战的义体人部队。"
  #维木奈
 MOB_4_APDF_DESC:0 "莫比斯陆军将领，奇美拉。没有人知道她的详细身世，因强大的身体素质以及让人捉摸不透的恐怖性格而被怀疑是从远方而来的吃人怪物，但能够与莫德克拉相处的非常愉快，两人从小就是要好的朋友且基本上形影不离，因此在参军后维木奈也成为了莫德克拉的贴身保镖。"
  #薇诺露娅
 MOB_5_APDF_DESC:0 "莫比斯陆军指挥官，人类。擅长使用装甲部队进行快速的穿插包围歼灭，在第一次秩序战争中依靠此类战术大放异彩。不过，元首一直对她过于激进的作战风格感到担忧。"
   #莫德克拉
 MOB_6_APDF_DESC:0 "莫比斯陆军指挥官，人类。作为莫比斯帝国的陆军元帅，擅长大军团作战，她那有条不紊的部队调度能力能够让其他前线的将领毫无顾虑的施展拳脚。"
  #布尼丝
 MOB_7_APDF_DESC:0 "莫比斯帝国将领。在第一次秩序战争期间，负责警戒莫比斯西部边境，拥有良好的步兵指挥能力。 " 
    #艾薇
 MOB_8_APDF_DESC:0 "莫比斯陆军指挥官，亚人类。艾薇是莫比斯军中最为年轻的军官之一，虚心学习的她受到了多位教官的喜爱。 " 
 #露米娅
 MOB_9_APDF_DESC:0 "莫比斯陆军指挥官，人类。从莫比斯军事学院毕业的年轻将领，艾普蒂菲的好友，元首的秘书。主要工作是“解密”元首的文件并将其分发给相关人员。 " 
    #斯布罗娜
 MOB_10_APDF_DESC:0 "莫比斯陆军指挥官，人类。或许是不善言辞吧，斯布罗娜一向寡言少语，不会多说一句废话，因此她总能够高效率的发号施令，她的部队也是莫比斯军中出了名的死气沉沉。"    #薇莲二世
 MOB_11_APDF_DESC:0 "莫比斯帝国前任皇帝，人类。曾领导莫比斯人民抵御洛维尼亚与斯塔王国的入侵，但最终失败。第十次莫洛战争结束后在年轻军官们的劝说下宣布退位，现在作为一名普通的莫比斯将军活跃在莫比斯军中。" 
    #佩尔卡
 MOB_12_APDF_DESC:0 "莫比斯陆军将领，人类。老牌贵族将领，因优秀的指挥能力而没被新任帝国陆军退役。"
   #凯瑟琳
 MOB_13_APDF_DESC:0 "莫比斯炮兵将领，人类。以优秀成绩毕业于莫比斯军事学院，因其独特的机动炮兵理论而被陆军指挥部重视，与薇诺露娅一起组建了莫比斯的装甲集团军。"
   #薇莲三世
 MOB_14_APDF_DESC:0 "莫比斯空军指挥官，半血族。无论是性格还是指挥风格都相当激进，与薇诺露娅是志同道合的好友。在第二次秩序战争期间成为莫比斯帝国第三任国家元首，战争结束后运用自身的威望说服帝国议会任命自己为终身元首。大力发展了莫比斯的经济，机械，月华工程，航天工程等相关领域。建立了德颂拉特首支空天舰队。促成了西洲联盟的诞生，并在“陨月入侵”与“魔女之夜”期间带领莫军援助了多个国家。哦对了，她比她妈高上不少，因此她回家的第一件事就是将妈妈举高高。"
 MOB_CHIANG_WLSS_DESC:"莫比斯帝国前朝太子，在帝国被推翻后成为了飞机爱好者"
 MOB_CHIANG_LMY_DESC:"艾普蒂菲的贴身秘书，也是艾普蒂菲的同窗同学，作为世界上少有的能理解艾普蒂菲不明逻辑语言的人，她对莫比斯的重要性可见一斑。"
  #洛维尼亚
  #布兰二十六世
 LOV_APDF_DES:0 "洛维尼亚女皇，曾致力于缓解贵族和皇室的矛盾，但有心无力。最终，她在骑士大会上被刺杀，成为了洛维尼亚今后乱局的导火索。"
   #瓦伦丝特
 LOV_walunsite_APDF_DES:0 "洛维尼亚政治家，军事家，人类。瓦伦丝特出身于洛维尼亚最有权势的瓦伦家族，并在她母亲瓦伦诺拉死后成为家族族长与贵族势力的最高领袖。为了让贵族能够彻底掌控洛维尼亚，瓦伦丝特开始了她的夺权计划，而一名不速之客正好提供了除掉布兰二十六世的机会。"
  #赛维娜嘉
 LOV_saiweinajia_APDF_DES:0 "洛维尼亚骑士团团长，人类。被希德瑞拉提拔的优秀陆军将领，擅长大规模的战略部署，在洛维尼亚的政治斗争中保持中立。" 
   #斯兰蒂
 LOV_silandi_APDF_DES:0 "洛维尼亚陆军将领，人类。出身于传统贵族的斯兰蒂拥有着相当优雅的气质，她对于复杂的政治斗争没有任何兴趣……大概？"
    #伊琳丝娜
 LOV_yilinsina_APDF_DES:0 "洛维尼亚陆军指挥官，年轻贵族将领，人类。自从斯塔东部的战争中失利后就一直在改进自己的战术理论，皇都保卫战中她的防御理论发挥了重要作用。唾弃屠杀无辜者的行为，与许多贵族将领不和。"
    #埃琳娜
 LOV_ailinna_APDF_DES:0 "洛维尼亚陆军将领，人类。骑兵是洛维尼亚的传统兵种，但随着时代与技术的进步，越来越多的将领更倾向于战斗力更加强劲的装甲部队，埃琳娜也属于其中之一。"
    #菲瓦莉
 LOV_feiwali_APDF_DES:0 "洛维尼亚陆军将领，人类。在洛维尼亚国内爆发起义时，她作为东方行省最近的部队被派遣到前线围剿起义军。但是她在作战中发现自己的装甲部队面对神出鬼没的起义军毫无还手之力。"
     #艾丽希娅
 LOV_ailixiya_APDF_DES:0 "洛维尼亚海军指挥官，人类。原先只是某艘战列舰舰长的侍从，在瓦伦蒂娜的帮助下，她成功替代了那名舰长。现在是瓦伦蒂娜的侍从。"
    #格林特拉
 LOV_gelintela_APDF_DES:0 "洛维尼亚海军指挥官，人类。是某个显赫贵族后代中最小的孩子，被家族安排进海军进行历练，但怕麻烦的格林特拉总能想到摸鱼的办法。于是，她成了洛维尼亚海军将领中最闲的家伙。" 
 #米菲修缇娅
 LOV_mifeixiutiya_APDF_DES:0 "洛维尼亚的贵族少女，人类。东方行省参与围剿起义军的指挥官之一，不过她似乎对镇压起义兴趣不大，仿佛现在发生的事情与自己无关。"
  #艾洛拉
 LOV_ailuola_APDF_DES:0 "洛维尼亚的贵族少女，沉默寡言，不善言辞。"
   #爱丽丝
 LOV_ailisi_APDF_DES:0 "洛维尼亚皇室陆军将领，种族是爱丽丝？据说是来自异界的奇特智慧生物，而这位爱丽丝是布尔莉娅的助手。"
    #布兰二十七世
 LOV_bulanershiqishi_APDF_DES:0 "洛维尼亚公主，人类。母亲布兰二十六世被刺杀后被迫上位，但贵族武装政变后被软禁在皇宫里，后在首都附近皇室成员们的努力下成功逃脱，甩掉贵族的追兵后被白交给布尔莉娅照顾。"
    #卡塔莉娅
 LOV_kataliya_APDF_DES:0 "来自精灵国度的花骑士，不知为何远走他乡，跟随瓦伦蒂娜来到洛维尼亚城的皇宫。                     “长官，这已经是第13起失踪案了，而且失踪的都是年轻的见习女仆，失踪时间基本都是在夜晚，我不认为这是巧合或者是其他原因造成的，但是这件事情真的很诡异。另外，女仆长禁止我们检查地下皇宫，我认为有猫腻，她们肯定把什么藏在地下皇宫了，我会派我的小队前去秘密调查，等我们拿到决定性证据后再来向您汇报。”——4月14号的记录                                                   “我喜欢意外之喜，但她们有点不新鲜了。”"
   #布尔莉娅
 LOV_buerliya_APDF_DES:0 "洛维尼亚皇室领袖之一，人类，神秘的魔法学者，据说已经见证了洛维尼亚一千年间的兴衰。洛维尼亚各阶级之间的矛盾越发严重，作为皇室领袖中最为年长的领袖，布尔莉娅一直在与贵族们暗中周旋，特别是在贵族集团政变之后担任着皇室抗争势力的主要力量。她十分清楚想要拯救现在的洛维尼亚需要什么样的猛药，这剂猛药，将改变整个洛维尼亚。" 
    #小爱丽丝
 LOV_1_APDF_DES:0 "这是一只还没长大的爱丽丝。别以为年龄小就好欺负！"
    #伊芙琳(没做)
 LOV_2_APDF_DES:0 "伊芙琳是一名洛维尼亚贵族，爱好狩猎。曾在小时候被亚人救过一命，因此对贵族上层集团迫害亚人的政策相当不满。伊芙琳在第一次秩序战争期间帮助许多亚人奴隶摆脱贵族骑士的追杀，人民之声的成立更是让她找到了自己一直以来追求的目标。"
 皇家骑士团团长
 ORD_APDF_DES:0 "洛维尼亚皇家骑士团团长，人类。与历代优秀的皇家骑士团团长一样，骁勇善战的希德瑞拉也十分遵守着皇家骑士团的规矩，最起码在暴君上台前是这样。"
 阿洛雅
 ORD_aluoya_APDF_DES:0 "洛维尼亚骑士，人类。阿芙兰的妹妹，闪耀的新星骑士，渴望在战斗中拥抱荣耀，喜爱指挥骑兵冲锋。" 
 阿芙兰
 ORD_afulan_APDF_DES:0 "洛维尼亚骑士，人类。女皇的白银护卫，目睹了布兰二十六被刺杀的全过程。在贵族武装政变后失踪，据说参与了解救布兰二十七世的行动。"  
 
    #洛维尼亚起义军
    #玛瑞莎
 RED_1_APDF_DES:0 "洛维尼亚北方亚人起义军领袖，亚人类。原本只是洛维尼亚某个贵族的奴仆，在一个风雨交加的夜晚，干掉了自己原先的主人后，玛瑞莎与她的好友凝华带领着一群受尽人类折磨的亚人奴隶一起组建了北方起义军。玛瑞莎能够熟练使用火焰魔法，这项优势让她能够亲自前往前线与起义军士兵并肩作战，对于她的同胞而言，玛瑞莎是带领她们脱离苦难的明灯，而对于洛维尼亚的人类而言，玛瑞莎则是一个杀人如麻的屠夫，所到之处只剩下燃尽的断壁残垣与烧焦的满地尸山。"
    #赵雅奏
 RED_zhaoyazou_APDF_DES:0 "里斯亚尼亚海军大臣，旗舰舰长，神州裔，人类。因厌恶里斯亚尼亚国内激进的政治斗争而成为海军指挥官的赵雅奏在被无端怀疑是国内革命军的卧底后干脆一不做二不休拉上向她求助的革命军们一起乘上里斯亚尼亚的旗舰征途号向北逃离。"
     #江雨
 RED_3_APDF_DES:0 "洛维尼亚南方起义军战士，亚人类。曾是斯塔王国的士兵，在抵抗洛维尼亚入侵的时候，首战被俘。她在洛维尼亚贵族的手中受尽折磨，被砍断左臂，但始终没有屈服。随着洛维尼亚国内的动荡，大部分看守亚人奴隶的警备力量都被派往镇压起义，江雨则在皇室成员的帮助下成功逃脱。加入起义军后，她凭借左臂的机械义肢与自己的作战实力，在多次战斗中表现出彩，逐步成为了南方起义军的优秀战士。"
     #江雪
 STA_4_APDF_DES:0 "斯塔王国将领，江雨的妹妹。在斯塔王国濒临覆灭之际宁死不降，所带领的自卫队成为了斯塔最后的抵抗力量，后下落不明。"
     #艾瑞奇
 RED_5_APDF_DES:0 "斯塔王国将领，亚人类。军中混子，平时总是给人一种老油条的感觉，但关键时刻也能够挺身而出。"
     #凝华
 RED_6_APDF_DES:0 "洛维尼亚北方亚人起义军领袖，亚人类。在起义前，身为图书馆奴仆的凝华经常偷偷带着书与玛瑞莎分享知识，在起义后两人依然互相帮助，不过在对待人类的态度上双方有着不同的观念。拥有北狐血统的凝华能够使用寒冰魔法进行作战，但使用火焰战斗的玛瑞莎会将她的寒冰魔法破坏掉，所以两人基本不会处在同一战场上，不过在平时，两人极端的体温倒是能够互相抵消。"
     #佩可丽
 RED_7_APDF_DES:0 "洛维尼亚起义军指挥官，亚人类。与大多数起义军成员一样，佩可丽也是不堪忍受贵族压迫的一员。不过与其他人不同的是，她对火药有独特的见解。为了保全起义军初期为数不多的火炮，她学会了战场伪装术以及炮火掩护战术，在实战中成功躲过了贵族军队强大的火力打击。"
  #克拉娜
 RED_kelana_APDF_DES:0 "洛维尼亚东方起义军将领。克拉娜原本只是洛维尼亚东方行省一名平庸的猎人，平日里只能依靠自己微薄的收入勉强果腹。在亚人起义爆发后，由于迫切想要改变自己的生活现状，便加入了东方起义军，开始了一段全新的奋斗历程。"
 #格温莉特
 RED_gewenlite_APDF_DES:0 "洛维尼亚东方起义军领袖，亚人类。格温莉特原先只是一个随处可见的奴隶，在被主人遗弃之后，一直过着流浪的生活。而她的人生在遇到斯蒂优之后，就被彻底改变了。随着洛维尼亚国内局势不稳定程度加剧，当得知北方起义军打响了反抗贵族统治的第一枪时，格温莉特便在斯蒂优的指引下，在洛维尼亚的东部号召奴隶与底层平民组建了一支新的起义军——东方革命军，举起了反抗的大旗。这支军队利用远离城市的小镇作为根据地，多次对贵族的部队进行分割歼灭，最终成为了洛尼亚皇室夺回统治权的一支强大而可靠的同盟力量。"
   #斯蒂优
 RED_8_APDF_DES:0 "洛维尼亚皇室陆军指挥官，人民之声创始人之一，人类。自从洛维尼亚建国以来，皇室与贵族的政治斗争就没有停过，其带来的恶劣影响造就了国内的混乱，打造一个完全统一的洛维尼亚迫在眉睫。斯蒂优出身于国内声名显赫的贵族家庭，养尊处优的她认为世界的一切都是如此美好。直到第十次莫洛战争的到来，她指挥的军队穿过城市的居住区时，发现这里的一切都与自己想象的完全相反，人们居住在拥挤的公寓里，乞丐向骑士们祈求一点点食物，随处可见的亚人尸体，肚子被完全刨开，里面空无一物……战争结束后，斯蒂优开始游走洛维尼亚各地，考察普通平民的生活状况，用自己的资金收留被贵族恶意迫害的落魄者，带领近卫骑士们捣毁一个个贩卖亚人奴隶的市场。在一个下着小雨的下午，斯蒂优与她的护卫骑士离开了由她的家族经营的大型奴隶市场后，她明白了，她需要一股力量，一股能够改变世界的力量。"
 #安捷瑞拉
 RED_anjieruila_APDF_DES:0 "洛维尼亚东方起义军战士，义体亚人类。这副身躯被原先的主人改造过，已经失去了感受情感的能力。"
 #丽萨
 RED_lisa_APDF_DES:0 "洛维尼亚东方起义军指挥官，亚人类。跟随格温莉特前往洛维尼亚东部发动起义的军官之一，擅长火炮的使用。"
     #切特拉
 RED_qietela_APDF_DES:0 "洛维尼亚东方起义军将领，格温利特的近卫装甲队长，亚人类。在东方起义军建立之初，切特拉便开始追随格温利特，她用自己的忠诚逐渐取得了领袖的信赖并被予以重任，其麾下的部队是东方起义军中为数不多的装甲部队，同时也是起义军插进贵族腹地的一把利刃。"
      #陵雪
 RED_lingxue_APDF_DES:0 "洛维尼亚起义军将领，亚人类。卡蒂的妹妹，受姐姐影响成为了装甲兵军官并以超过姐姐为目标努力着，因此学习了多个军事领域的知识。"
       #姬蓝
RED_jilan_APDF_DES:0 "洛维尼亚北方亚人起义军指挥官，亚人类。凝华的妹妹，天真善良，能够使用寒冰魔法战斗。"
        #卡蒂
 RED_kadi_APDF_DES:0 "洛维尼亚南方起义军将领，亚人类。被斯蒂优营救的亚人之一，在学习了军事理论后成为起义军的将领。"
         #残霜凝华(没做)
 RED_99_APDF_DES:0 "暴风雪已经过去，少女拖着逐渐恢复但仍然残破不堪的身躯，望着仍然飘着白雪的天空，回想起刚刚所发生的一切。一旁年长的前辈问了她一个问题：“所以……你有她的外貌，她的声音，她的记忆……但你究竟是什么？是她？还是你自己？”“我不知道……”少女将继续寻找答案。"
  #风雪之都
 SNO_1_APDF_DES:0 "风雪之都领袖，人类。来自遥远之地的理想主义者，为促进北境亚人文明的发展做出了不可磨灭的贡献。"
 SNO_2_APDF_DES:0 "风雪之都陆军指挥官，亚人类。擅长坦克的研发与部队的管理，与遥关系十分要好。"
 #阿库娅共和国
 AKU_1_APDF_DES:0 "阿库娅陆军指挥官，亡灵族。戴着兔子头饰假装自己是兔子。"
  #断魂港
 BSP_1_APDF_DES:0 "在断魂港长大的猎人，狩猎各种妖魔鬼怪。"
 #艾希尼亚
 AIS_walunfeili_desc:"洛维尼亚驻艾希尼亚外交官，瓦伦家族旁系成员。由于家族地位较低，瓦伦菲莉经常饿肚子，出于生存原因出来做兼职。"
 AIS_teleimi_desc:"工业部副部长，作为赴莫留学生，特雷密也深受莫比斯风气的影响，变成了一个军工狂人，为此可以牺牲一切不重要的东西。"
 AIS_huolahuo_desc:"被大企业挤兑破产的天才商人，想借助你的力量东山再起。"
 AIS_meilisi_desc:"退休军官，被军方委托成为军方在政府的代表。"
 #升阳帝国
 #阳洁羽
 SHE_YangJieyu_APDF_DES:0 "原为神州将领，现为升阳帝国领袖。在政治斗争失败后，阳洁羽开始拉拢东国地区的叛乱分子企图自立为王，但在神州军队的围攻下只得逃往海外的群岛上，而群岛上有一座损坏严重的超古代遗迹。"
   #弥灰绫
 SHE_MiHuiling_APDF_DES:0 "原是安阳国海军的一名舰队指挥官，在阴差阳错下的卷入了阳洁羽的政变危机，与阳洁羽成为了一根绳子上的蚂蚱，在升阳帝国建立后得到重用。" 
  #欧志七霖
 SHE_Oukokorozasi_Nagame_APDF_DES:0 "升阳帝国海军元帅，人类。原安阳国将领，跟着阳洁羽叛乱失败后逃亡至现今升阳帝国所在的岛屿，在升阳帝国宣称建国后担任升阳海军总司令。" 
   #北化奈
 SHE_Kitaka_Dai_APDF_DES:0 "升阳帝国海军指挥官，升阳海军学院的创始人，人类。原安阳国将领，擅长海上破交作战，曾在跟随阳洁羽叛乱时指挥舰队切断安阳国与东洋军的联系。"
   #般齐赫希
 SHE_BanQihexi_APDF_DES:0 "升阳帝国陆军将领，人类。原安阳国将军，擅长指挥大规模军团冲锋。"
   #尼乐香奈
 SHE_Nero_Kana_APDF_DES:0 "升阳帝国海军将领，亚人类。交界群岛的原住民，因乖巧的性格成为升阳海军的“吉祥物”。" 
  #抚宁菲
 SHE_FuNingfei_APDF_DES:0 "升阳帝国陆军指挥官，人类。原为安阳国将军，听信了阳洁羽的谗言一同发动政变后失败，后跟随阳洁羽等人退往现在升阳帝国的所在地。在她认为，原来的安阳国政变是有益于安阳国今后的发展的，只是因为安阳国领袖的腐朽而没有成功，但是很明显，阳洁羽并不会告诉她真相。"
 #伊邪美
 SHE_LinGui_APDF_DES:0 "升阳帝国陆军将领，东国鬼族。为了扩张帝国的领土，拉拢了许多凶猛的鬼族战士并亲自策划了多场入侵战争。虽然是鬼族但并不擅长近身搏斗。" 
  #凛鬼
 SHE_LiMisha_APDF_DES:0 "升阳帝国陆军将领，东国鬼族。为了扩张帝国的领土，拉拢了许多凶猛的鬼族战士并亲自策划了多场入侵战争。虽然是鬼族但并不擅长近身搏斗。" 
   #西园寺早苗
 SHE_Saionji_Sanae_APDF_DES:0 "升阳帝国的巫女，人类。原是三神院侍奉神明的巫女，在军方发现其强大的魔法亲和力后被派往先遣军为前线将士提供“神明的祝福”。" 
 Agnes: "爱葛妮丝"
 SHE_Agnes_APDF_DES:0 "升阳帝国陆军将领，鬼族。使用机械武装的战士，跟随升阳登陆部队入侵西洲大陆。"  
 #野奈雅
 SHE_Nou_Naga_APDF_DES:0 "升阳帝国陆军指挥官，人类。原为安阳陆军将领，负责为陆军培养优秀的战士。喜爱东国传统刀法，但也十分了解现代战争需要什么样的战术。"  
 #小安
 SHE_XiaoAn_APDF_DES:0 "升阳帝国战士，亚人类。原为交界群岛原住民，被升阳陆军训练为优秀的战士。"  
  #姬雪
 SHE_JiXue_APDF_DES:0 "波萨利安战士，东国鬼族。因血统十分纯正而被训练为冲锋在前的武者，爱好是看书与绘画。" 
  #利米莎
 SHE_LiMisha_APDF_DES:0 "升阳陆军将领，东国鬼族。喜爱近距离拼杀的鬼族少女，改造的高强度单兵能量护盾使她在面对数以百计的敌人时也能不落下风。"
  #阴酒流子
 SHE_Nagare_APDF_DES:0 "升阳帝国海军指挥官，亚人类。在朴素的服装下是残破的身躯，流子的身体由多种生物组合而成，她的性格也如此一般诡异。" 
  zuolehailun: "佐乐海伦"
  #佐乐海伦
 SHE_zuolehailun_APDF_DES:0 "升阳军战士，鬼族亚人混血。原是交界群岛原住民，经过机械化改造后拥有更强大的身体素质。并不清楚自己战斗的目的，只知道自己要大开杀戒。"
 #玛可娜
SHE_MaKena_APDF_DES:0 "升阳帝国海军将领，人类。交界群岛的原住民，被升阳军部看中并重点培养，现在是一名指挥能力出众的海军指挥官。"
 #瑞恩公国
  moyila:0 "莫伊拉"
 DUC_moyila_APDF_DES:0 "瑞恩公国陆军指挥官，人类。拥有不错的步兵指挥能力，在升阳帝国先遣军进攻时亲临前线鼓舞士气，凭借坚固的放线有效拖延了敌军进攻的步伐。"
  #卢瑟联邦
  moyila:0 "蔻丝妮"
 RUT_kousini_APDF_DES:0 "卢瑟联邦领袖，人类。医疗兵出身，擅长恢复型魔法，行事一丝不苟。"
  #奈德兰共和国
  tonghua:0 "桐华"
 RUT_kousini_APDF_DES:0 "奈德兰共和国将领，人类。拥有出色的空军作战能力，在她指挥下的奈德兰空军部队成为了西洲大陆不可忽视的空中力量。"
   kunna:0 "昆娜"
 RUT_kousini_APDF_DES:0 "奈德兰陆军指挥官，人类。带领军队在奈德兰西部守护边境的安定。"
  #沙洲工业集团
  hanni:0 "汉妮"
 KIA_hanni_APDF_DES:0 "沙洲工人联合军指挥官，人类。原先是沙洲工厂的机械技术工人，领导了多个城市的工人起义，对坦克部队的作战有一定的研究。"
  laoluntina:0 "劳伦缇娜"
 KIA_laoluntina_APDF_DES:0 "一名莫比斯军官。她在第一次秩序战争期间帮助沙洲的工人们反抗工业集团的压迫，因此被称为“沙洲的劳伦缇娜”。"
   #奇拉王国
 xiruiwei:0 "希瑞薇"
 NGD_xiruiwei_APDF_DES:0 "奇拉王国女王，人类。没有太多人知道她的出身，据说曾是洛维尼亚大教堂的神职人员。"
  maliya:0 "玛丽亚"
 NGD_maliya_APDF_DES:0 "奇拉王国骑士团团长，人类，是希瑞薇的得力助手。她的母亲因无法忍受洛维尼亚贵族的虚伪而来到奇拉殖民地并在独立战争中战死，玛丽亚也继承了母亲的性格与遗志，成为奇拉人民最可靠的剑盾。"
  aijiluna:0 "艾吉露娜"
 NGD_aijiluna_APDF_DES:0 "奇拉王国海军指挥官，人类。因其海盗出身而备受争议，但据她的下属称艾吉露娜人还不错，不会去搞一堆形式主义的麻烦事。"
   #古西布拉公国
  xinaiya:0 "茜奈雅"
 GUS_xinaiya_APDF_DES:0 "古西布拉贵族，人类。并没有什么特别的才能，仅仅是因为美丽的外表而成为公国的代表。"
  #奇恩帝国
  lilimaliansanshi:0 "莉莉玛莲三世"
 TZY_lilimaliansanshi_APDF_DES:0 "奇恩帝国女皇，人类。作为奇恩的第三位女皇，从小接受了良好教育的她，让原本就蒸蒸日上的国力更上一层，使其能够作为大国参与国际角逐。"
   aisilan:0 "艾丝兰"
 TZY_aisilan_APDF_DES:0 "奇恩陆军元帅，人类。莉莉玛莲二世时期的老将，为了加强帝国陆军的战斗力量，提拔了许多有能力的年轻将领，看人可以说十分的准。"
 youliya:0 "尤利娅"
 TZY_youliya_APDF_DES:0 "奇恩陆军指挥官，人类。出身显赫，负责奇恩火炮的设计与生产，同时也是莉莉玛莲三世的老师。"
   feidinisiya:0 "菲蒂尼丝娅"
 TZY_feidinisiya_APDF_DES:0 "奇恩帝国陆军指挥官，人类。是奇恩帝国最早运用装甲集团作战的将军，因其大胆的作战方式而闻名。"
   katewen:0 "卡特文"
 TZY_katewen_APDF_DES:0 "奇恩帝国士兵，精灵族，据说年龄不小。在秩序战争前，她只是游历各国的退伍士兵，在战争爆发后，不得不再次入伍，前往战场前线。"
   biyoulai:0 "比优莱"
 TZY_biyoulai_APDF_DES:0 "莫比斯帝国装甲设计师，人类。一只眼睛因为一次实验意外受损，但这丝毫不影响她的研究热情，她的工业理论和机械师技术为莫比斯的装甲部队壮大提供了十分关键的基础。在莫比斯帝国与奇恩结盟后作为军事顾问前往奇恩进行技术交流。"
   feinila:0 "菲妮拉"
 TZY_feinila_APDF_DES:0 "奇恩帝国陆军将领，精灵族。因为是人类与精灵的混血儿，所以菲妮拉可以把自己那较短的尖耳朵藏在头发之下。对装甲部队有着出色的理解，是奇恩陆军冉冉升起的新星。"
   kelisiduo:0 "克莉丝多"
 TZY_kelisiduo_APDF_DES:0 "奇恩陆军将领，人类。毕业于奇恩军事学院的贵族学生，在首都陆军服役一段时间后被派往北方集团军。"
   katelan:0 "卡特兰"
 TZY_katelan_APDF_DES:0 "居住在奇恩境内森林的精灵，卡特文的母亲，擅长自然魔法。"
   fukelina:0 "芙可丽娜"
 TZY_fukelina_APDF_DES:0 "奇恩帝国海军指挥官，人类。第六届奇恩帝国军校的毕业生，以优越的成绩加入奇恩海军并受到尼米德卡栽培。因为身高关系经常被不明真相的新兵认为是尼米德卡的上司。"
   nimideka:0 "尼米德卡"
 TZY_xinaiya_APDF_DES:0 "奇恩海军指挥官，人类。尼米德卡虽然是一名海军教官，但对空军的理解却更为透彻，在航母逐渐成为海战主力后，帝国需要能够驾驭这种新型作战方式的指挥官，尼米德卡就理所当然的成为了最佳人选之一。现在，奇恩的航母战斗舰队已经初具规模，她们将在即将到来的战争中大放异彩。"
  #神射手(没做)
 TZY_11_APDF_DES:0 "一名训练有素的神射手。"
   #艾希尼亚
   luosailuona:0 "罗赛罗娜"
  AIS_luosailuona_APDF_DES:0 "艾希尼亚女王，人类。作为被改造的义体人，饱受国际舆论争议，许多人认为她是智械统治德颂拉特的第一步，不过艾希尼亚在她的统治下一直国泰民安，直到第一次秩序战争。"
 limilian:0 "莉米莉安"
 AIS_limilian_APDF_DES:0 "艾希尼亚骑士团团长，人类。性格直率的少女骑士，她在第一次秩序战争的最后时刻保卫了艾希尼亚领土的完整。"
 nuobeisi:0 "诺贝丝"
 AIS_nuobeisi_APDF_DES:0 "艾希尼亚军官，人类。一名普通的前线军官，没有什么傲人的战绩。"
   #魔法少女同盟和法兰
   ailin:0 "艾琳"
 MAG_ailin_APDF_DES:0 "法兰海军指挥官，魔法少女。奈尔嘉德的好友之一，擅长星空魔法的使用，从天而降的陨石对于战舰的威胁还是不容小觑的。"
   geladisi:0 "格拉蒂丝"
 MAG_geladisi_APDF_DES:0 "法兰陆军将领，魔法少女。可爱闪亮的粉色系魔法少女，能够使用威力巨大的魔法泡泡进行作战。"
   naierjiade:0 "奈尔嘉德"
 MAG_naierjiade_APDF_DES:0 "魔法少女同盟的创始人，法兰的重建者。作为一名四处流浪的魔法少女，十分渴望得到稳定的生活，而记录在传说故事中的魔法少女国度——法兰帝国自然而然的成为奈尔嘉德向往的目标，她开始招兵买马，并展露自己的出众的才能与野心。"
    nuolina:0 "诺丽娜"
 MAG_nuolina_APDF_DES:0 "法兰陆军将领，魔法少女。出身卑微的普通少女，与亲朋好友一起加入魔法少女同盟。"
   yinuoya:0 "伊诺雅"
 MAG_yinuoya_APDF_DES:0 "法兰陆军指挥官，传奇魔法少女。热情的大姐姐，喜欢喝茶特别是低语花茶。据说是两千五百年前毁灭的法兰旧帝国的审判长，拥有让人真诚相待的能力，现在是法兰议会的重要议员之一，具有非常强大的作战实力。不过，在指挥部队方面似乎不是特别上心。"
   aeraili:0 "阿尔艾莉"
 MAG_aeraili_APDF_DES:0 "法兰指挥官，魔法少女。奈尔嘉德的旧友，当听说法兰王国建立后，立刻赶来帮助她的老友。作为一名行游商人，她的许多魔法道具都能够为前线战场提供帮助。第一次秩序战争结束后，建立了魔法安全协会，创造并管理法兰国内的各式法术。"
    kuna:0 "库娜"
 MAG_kuna_APDF_DES:0 "法兰空军将领，魔法少女。或许是对于天空的向往，库娜十分喜爱研究奇形怪状的飞行器，为推动魔导机器的发展起到了重要作用。"
   balunna:0 "巴伦娜"
 MAG_balunna_APDF_DES:0 "法兰科学家，魔法少女。专注于星空魔法研究的少女，与伊诺雅是好友，两人经常进行茶会与学术交流。"
   aleisi:0 "阿蕾丝"
 MAG_aleisi_APDF_DES:0 "法兰陆军指挥官，植物学家，魔法少女。艾米莉的好友之一，擅长自然魔法的运用。虽然不是出身尊贵，但常常透露出高傲的气质。"
  aimili:0 "艾米莉"
 MAG_aimili_APDF_DES:0 "法兰陆军指挥官，传奇魔法少女。奈尔嘉德最信任的副手，拥有超远距离心灵沟通能力，她常常使用此能力联络友方部队或干扰敌人的判断。据说是旧帝国的公民。"
   misite:0 "米丽特"
 MAG_misite_APDF_DES:0 "法兰王国将领。曾经是一位受魔法少女同盟庇护的咒术师，擅长使用爆裂魔法。后加入法兰军队，追随奈尔加德征战四方，投身到重现法兰荣光的事业中。"
   heiyu:0 "黑羽"
 MAG_heiyu_APDF_DES:0 "一名训练有素的黑羽。黑羽是法兰羽翼的基层作战人员。"
    dailan:0 "戴兰"
 MAG_heiyu_APDF_DES:0 "一名沉默寡言的传奇魔法少女，曾在法兰军队服役过一段时间，具有极强的单人作战能力。退役后在法兰首都的幽兰工坊担任安保工作，经常在工坊门口站着睡大觉。"
    #莫拉(没做)
 MAG_1_APDF_DES:0 "传奇魔法少女，奈尔嘉德的好友，经验丰富的前线指挥官，坚定的共和主义者。曾在多个国家担任军事顾问，在魔法少女同盟成立后立刻前去支援，并与奈尔嘉德一起抗击升阳人的侵略，但随着奈尔嘉德解散同盟并称帝，两人就此决裂。"
 #布拉莉塔(没做)
 MAG_2_APDF_DES:0 "法兰将领，传奇魔法少女。奈尔嘉德的好友之一，现在这具身体只是装其意识的机器……"
 #4657后
   #德蕾辛(没做)   
 MAG_3_APDF_DES:0 "一名作战经验丰富的魔法少女，诗兰的导师。曾是黑骑士团的一员，但在那场著名的拉达德大屠杀发生后就退出了黑骑士团，成为了一名自由佣兵。擅长使用多样的进攻手段击垮对手，据她自己所说她在第二次秩序战争期间一人击溃了莫比斯的一支重装步兵团……不过绝大部分人都觉得这家伙在吹牛。"
  #诗兰(没做)
 MAG_4_APDF_DES:0 "一名战斗经验丰富的魔法少女，幽兰与诗礼华的孩子，是法兰境内最臭名昭著的雇佣兵组织黑骑士团的成员。不过诗兰作为其中人缘最好的家伙，一直在维持黑骑士团与其他势力的关系。喜欢看小说，最喜欢的小说为《黑枪客》，讲述了一名沉默寡言的“正装暴徒”在充满罪犯的都市里声张正义的故事。诗兰的武器与魔装也或多或少受其影响。"
 #幽兰(没做)
 MAG_5_APDF_DES:0 "一名冷静耐心的魔法少女，据说拥有掌控时间的能力……幽兰成为法兰公民后在首都工业城开了一家名叫幽兰工坊的武器铺，售卖或锻造各式各样的武器、钟表、工具、以及幽兰在自己的时间里制作出的各种小玩意。不过因其特殊的锻造工艺一般不接受法兰军方的批量订单。"
  #真月小白(没做)
 MAG_6_APDF_DES:0 "法兰东巢6翼的白翼，性格和善，对组织与任务尽职尽责，擅长使用高调的白魔法。真月是她作为白翼的代号，而小白是对那些不属于洛维尼亚皇室成员的纯白家族后代的称呼。"
  #哈斯佩芙
 ailuoyi:0 "爱洛依"
 HAS_ailuoyi_APDF_DES:0 "哈斯佩芙的圣女，天翼族。虽然是哈斯佩芙明面上的领导人，但并不擅长处理国际事务，所以，那些处理不了的国际事务则由阿吉丽雅与其他官僚完成。"
 ajiliya:0 "阿吉丽雅"
 HAS_ajiliya_APDF_DES:0 "哈斯佩芙陆军指挥官，天翼族。她对于战争并不是特别上心，但在第一次秩序战争中依然表现出彩，成功保卫了哈斯佩亚。"
   #加安斯共和国
 waertaya:0 "瓦尔塔娅"
 REP_waertaya_APDF_DES:0 "加安斯领导人，人类。擅长外交的她一直在努力保证国家不会进入腹背受敌的状态。"
 zuoyi:0 "佐伊"
 REP_zuoyi_APDF_DES:0 "加安斯突击队队员，人类。受过专门的特种作战训练，因此具有比普通士兵更强的战斗力但还未经受战火的洗礼。"
 beiliaiqie:0 "贝利艾切"
 REP_beiliaiqie_APDF_DES:0 "由莫比斯与加安科的科研团队共同创造的月华智械，实验编号为9765，具有与正常人类一致的情感反应，同时能够进行多样的机械改装。"
 #永恒之国
 #ZERO
 ETE_ZERO_APDF_DES:0 "远在北方偏远地区的智械聚集地永恒之国的主控计算机，具有强大的信息分析能力，对于德颂拉特原住民持友好态度。"
 zige:0 "嘉比里拉"
 ETE_zige_APDF_DES:0 "超古代机械生命体，被永恒之国从遗迹的休眠仓中唤醒，现在与其保持着友好的合作关系。"
 huanmo:0 "紫歌"
 ETE_huanmo_APDF_DES:0 "永恒之国月华智能AI，控制着永恒之国的重型作战单元，具有强大的信息传输能力。在刚刚来到德颂拉特时尚未完成心智觉醒，同时由于设计缺陷而导致情感模拟器损坏，无法与有机智慧生命体正常交流。现在的紫歌已经没有这样的问题了，不过其说话方式仍然让人感到平淡，没有情绪起伏。"
 baoweizhe:0 "幻沫"
 ETE_baoweizhe_APDF_DES:0 "永恒之国月华智能AI，控制着永恒之国远程火力单元。具有强大的逻辑思维能力，是心智觉醒最完全的月华智械，能够与任何智慧生命体正常交流。"
 baoweizhe:0 "保卫者"
 ETE_baoweizhe_APDF_DES:0 "超古代遗迹的守护者AI，拥有高度智能。没人知道超古代文明曾经是怎样的辉煌又是经历了什么才落得这般田地，但从其留存与德颂拉特的种种迹象表明，曾有天外来客带来了新的生命。"
  #黄昏圣国
  kela:0 "科拉"
 OLI_kela_APDF_DES:0 "黄昏圣国至高圣骑士，人类。圣国的人民一直没有忘记被安息之国夺去的家园。在吸取了失败的经验后科拉开始改革军队体制，并研究有效击败亡灵生物的手段。科拉和她忠诚的骑士们一直在等待一个机会，如今随着战争的打响，机会似乎就在眼前，是时候夺回曾经失去的荣耀了。"
   #启明星
  miuyun:0 "缪云"
 ENU_miuyun_APDF_DES:0 "启明星创始人，1号枢纽主管，奇美拉。在离开自己的出身地后凭借自身对超古代文明的理解与知识找到了埋藏在北境地下的1号枢纽并以此为据点成立了德颂拉特超古代科研组织——启明星，作为主管管理着启明星的一切。"
 ENU_R_APDF_DES:0 "启明星兔子突击队队长，义体亚人类。原先是游荡在世界各地兔子雇佣军队长，在被一个超古代科研组织雇佣后签订了永久雇佣合同。R在一次危险行动中身受重伤，因此现在想要正常行动需要装备特制的动力防护服。"
   pohuaizhe:0 "破坏者"
 ENU_pohuaizhe_APDF_DES:0 "启明星兔子突击队副队长，人类。跟随R与超古代科研组织签定了永久雇佣合同，身为副队长的她精通枪械和爆破，在任务中可以摧毁绝大多数建筑防御，同时在R无法下定决心或犹豫不定的时候帮助她进行选择。因此，大胆而极具破环力的她成为了R的左膀右臂。"
   xundaozhe:0 "殉道者"
 ENU_xundaozhe_APDF_DES:0 "启明星死神小队队长，人类。精通巷战的她和她的死神小队接受了超古代科研组织的雇佣，并跟随启明星进行各种行动。在最后的一次行动中，殉道者的死神小队和其他受雇佣的雇佣兵团前往斯塔王国的萨拉特营救“指挥官”的任务中遭遇不明生物的埋伏，负责殿后的死神小队因此失联。"
   caixia:0 "彩夏"
 ENU_caixia_APDF_DES:0 "启明星舰队指挥官，亚人类。因触犯禁忌而被所在氏族放逐之人，在阴差阳错之下被启明星发现并收留。虽然性格并不十分正经，但在作战时总是十分可靠，往往能想出其她人意想不到的鬼点子。"
   yilian:0 "伊莲"
 ENU_yilian_APDF_DES:0 "斯塔起义军的领袖，亚人类。受斯蒂优的托付而前往斯塔组织起义军的后方根据地，但被骑士团逼的走投无路后请求启明星带着斯塔的起义军一起离开斯塔。"
    linai:0 "莉乃"
 ENU_linai_APDF_DES:0 "斯塔陆军指挥官，亚人类。出身显赫的莉乃曾前往莫比斯军事学院学习过一段时间，她深知斯塔的军队发展太过落伍，并向女王提出了组建机动部队的方案。但斯塔落后的工业要想组建机械化部队太过困难，于是，她开始为士兵训练反坦克手段，并撰写《应对机动部队手册》一书。但还没等指挥部将其纳入标准训练方案，战争就已经开始了。"
    miluoxita:0 "米洛茜塔"
 ENU_miluoxita_APDF_DES:0 "斯塔王国陆军将领，亚人类。在塔格昂战役中遇到启明星的雇佣兵，带领斯塔军残部与莉乃等人前往启明星。"
    hedifuni:0 "赫蒂芙尼"
 ENU_hedifuni_APDF_DES:0 "斯塔王国海军将领。在斯塔王国覆灭前，赫蒂芙尼是斯卡五世忠诚的追随者，同时也是一名优秀的代理提督，她所治理下的斯塔王国海军，在相当长一段时间被周边大国视为一支最具威胁的海上力量。莫比斯帝国崛起后，她的舰队多次挫败了莫比斯的海上进攻计划，首当其冲地成为了莫比斯海军的眼中钉。在一次例行巡逻中，由于情报误导，她的舰队陷入了数倍于己方的莫比斯主力的围攻，几近全军覆没。绝望之际，她天缘奇遇般撞见了正在保护特殊人物撤退的启明星特种作战小队，在得到对方的允许之下，她决定加入启明星以提升自己的实力，带领自己的最后的舰队全程为启明星护航。她知道，可能会有相当长一段时间，无法回到自己的故乡了，不过她相信，只要自己磨练的足够强大，就一定能创造新的希望。"
  #霜狼氏族
  hana:0 "哈娜"
 FRO_hana_APDF_DES:0 "霜狼氏族战士，亚人类。在风雪之都的帮助下带领霜狼氏族自卫队与北狐氏族的盟友一起反抗军团雇佣兵的侵略。"
   #北狐氏族
  busha:0 "布莎"
 ORT_busha_APDF_DES:0 "北狐氏族领袖之一，伊莎的姐姐，拥有出色的战斗能力。在抵抗军团入侵时，负责镇守雅赛博。"
 yisha:0 "伊莎"
 ORT_yisha_APDF_DES:0 "北狐氏族领袖之一，布莎的妹妹，拥有出色的战斗能力。在抵抗军团入侵时，坐镇氏族首都零海镇，统筹指挥族人对侵略者予以迎头痛击。"
    #安息之国
  walundina:0 "瓦伦蒂娜"
 COU_walundina_APDF_DES:0 "瓦伦家族的私生女，据说是安息之国的魔王。在与洛维尼亚贵族达成交易后，雇佣军团杀手刺杀了布兰二十六世，而现在的瓦伦蒂娜是洛维尼亚的女皇，为了完成自己的复仇而行动着。"
 wendi:0 "温蒂"
 COU_wendi_APDF_DES:0 "幽暗谷的住民，亡灵族。较为沉默，据说背负着某种诅咒。与自己的同伴们巡视着幽暗地区的情况，保护此处安逸生态的现状，经常因头上的长角被树枝藤蔓缠绕而感到困扰。"
 xiatigute:0 "夏提古特"
 COU_xiatigute_APDF_DES:0 "安息之国的领袖之一，血魔。夏提古特是瓦伦蒂娜的眷属，在瓦伦蒂娜离开时负责管理安息之国，但她对于主人的领导能力一直抱有一丝小小的疑问。"
 feiluolunsi:0 "斐罗伦丝"
 COU_feiluolunsi_APDF_DES:0 "安息之国的渡魂者，亡灵族，拥有安抚心灵的能力。斐罗伦丝的工作是安抚狂躁的灵魂，那些怨念极重的危险个体只要在她的安抚下都能平静下来，乃至沉睡。对于痛苦的生者而言，安逸的永眠比折磨的人生更加令人向往吧。"
 fating:0 "法婷"
 COU_fating_APDF_DES:0 "魔王军将领，魔族。顽皮，喜好恶作剧，擅长长距离飞行。"
 mase:0 "玛瑟"
 COU_mase_APDF_DES:0 "尽职尽责的魔族女仆，阿尔西佩的眷属。不好杀戮，并不是因为善良，而是讨厌弄脏衣服。"
 aerxipei:0 "阿尔西佩"
 COU_aerxipei_APDF_DES:0 "魔王军统帅，魔族。瓦伦蒂娜忠诚的副手，擅长利用贪婪的人心达成目的。"
 biersi:0 "碧儿丝"
 COU_biersi_APDF_DES:0 "一名被抛弃的亡灵女仆。因为面部无法做出表情，只能用面具表达自己的情感。但面具上的表情真的是她内心所想的吗？还是说那只是她想让你看到的脸？"
 yejing:0 "夜净"
 COU_yejing_APDF_DES:0 "一名探索远古遗迹的图书馆馆长，亡灵族。北境曾经是一片繁荣的国度，直到从天而降的月亮摧毁了这里的一切。"
 zixie:0 "紫谐"
 COU_zixie_APDF_DES:0 "一名高冷的亡灵女仆，曾与一位名叫纳叶的亡灵族少女一起游历各国……那是很久以前的记忆了。"
 #安息之国
 buliqite:0 "布里奇特"
 LIV_buliqite_APDF_DES:0 "在月骸荒地游荡的发狂魔女，早已失去之前的记忆，只是在本能的狩猎亡灵。"
 xiaojiang:0 "小僵"
 LIV_xiaojiang_APDF_DES:0 "这是一只可怕的僵尸？很可怕吗？是的很可怕，但她能够正常与人交流，或许是镇尸符的作用？"
   #军团
 heersi:0 "荷尔丝"
 LEG_heersi_APDF_DES:0 "军团领袖，亚人类。原为一名斯塔将军之女，在斯洛战争中意外被俘，成为奴隶。接下来的日子里，荷尔丝受尽折磨与苦痛，她已经记不得自己被“主人”们打昏了多少次了。但幸运的是，荷尔丝在一次被运往南方城市的火车上被军团士兵营救，并成为军团士兵的一员。在军团当时领袖海伦娜的指导下，荷尔丝成为了一名优秀的战士，高超的作战技巧与对军团的忠诚让她在军团中取得了不错的地位。在一次执行任务的过程中，她意外遇到了一位熟悉之人，那就是她的母亲，穿着当年她最熟悉的斯塔军军服坐在旅馆的椅子上，母亲告诉荷尔丝当年她被洛维尼亚骑士抓走并不是意外，她身上有着北方亚人的血脉，是属于完美战士的血脉，所以母亲与军团领袖海伦娜还有贪婪的洛维尼亚贵族达成了一笔交易。当荷尔丝知道她之前经历的一切痛苦，她的理想与执念只不过是一场骗局时，她愤恨的杀死了那名年迈的斯塔将军，并回到军团大营，没有片刻犹豫，她立刻找军团领袖海伦娜报了仇。虽然大仇得报，但却什么也改变不了，她现在是军团的新领袖了，而她的斗争也远远没有结束。"
 shashoutu:0 "杀手兔"
 LEG_shashoutu_APDF_DES:0 "军团猎手，亚人类。杀手兔是领袖们给予她的代号，真名早已被忘却。没有人知道她是从哪儿来的，要到哪里去，现在的她只是一个杀戮机器，有血腥味的地方不一定有她，但有她的地方必定血流成河。杀手兔执行任务的手段极其残忍，基本不留活口，有她的存在，很少有人敢质疑军团高层的命令，毕竟没人知道她的下一个任务目标会不会是自己。"
 shijunzhe:0 "弑君者"
 LEG_shijunzhe_APDF_DES:0 "军团猎手，奇美拉。据说是从某个超古代实验室逃出来的生物兵器，因残忍刺杀了洛维尼亚女皇布兰二十六世而被称为弑君者。她那的大帽檐下藏着她那深不可测的脸，她的性格也如同那张脸一样阴晴不定。弑君者的作战风格十分干净利索，利用压倒性的攻势击溃敌方的士气和防御随后一击致命，因弑君者而死的受害者尸体除了致命伤之外往往没有多余的伤口，因此经常被妮芙托付带来“收藏品”的素材。"
 mafeilite:0 "玛菲丽特"
 LEG_mafeilite_APDF_DES:0 "军团指挥官，亚人类。身为蛛型亚人的玛菲丽特擅长在高处伏击敌人，因此她的指挥风格也继承其阴险的特质。"
 linlan:0 "琳岚"
 LEG_linlan_APDF_DES:0 "军团指挥官，人类。对一切事物充满好奇，脸上总是挂着一副骇人的笑容，但与她相处的士兵并不因此害怕她。"
 nifu:0 "妮芙"
 LEG_nifu_APDF_DES:0 "军团医疗人员，人类。原为洛维尼亚某家小诊所的护士，患有极端恋尸癖，在被骑士团发现非法藏匿尸体后向南逃亡，因擅长外科手术而被军团收留，后成为一名军医并开始学习神秘的亡灵法术，这使她能够在战斗中使用“人偶”攻击敌人。妮芙还擅长使用特殊保存手段将尸体“包装”成美丽的“收藏品”，她的梦想就是制作这个世界每个种族的“收藏品”。"
 dailan:0 "戴兰"
 LEG_dailan_APDF_DES:0 "军团将军，亡灵族。荷尔丝重点关照的优秀战士，因适应极端寒冷的体质被荷尔丝派去处理洛维尼亚的入侵北方亚人氏族雇佣兵委托。在军团内战中坚定的与荷尔丝站在同一战线，并作为新军团长完成了她的遗愿。"
    #香格里拉
 mei:0 "梅"
 SHA_mei_APDF_DES:0 "香格里拉安保部部长，人类。缪拉信任的副手，拥有访问枢纽防御系统的权限。做事一丝不苟，擅长情报收集，有重度洁癖，厌恶肮脏的玩意。"
 jiyu:0 "冀宇"
 SHA_jiyu_APDF_DES:0 "香格里拉科研人员，奇美拉。技术高超的冀宇十分有资格成为顶尖的科学家，但她疯疯傻傻的性格随时可能会做出让人震惊的事。她说的话时假时真，在沟通方面可能会有点困难。她的人际关系非常糟糕，除了缪拉之外，没人对她有好感。"
 miula:0 "缪拉"
 SHA_miula_APDF_DES:0 "缪拉是香格里拉的领袖，也是713号枢纽的主管。虽然经常摆着一张臭脸，但缪拉的性格其实非常随性。作为一个已经渡过漫长岁月的月华族，不仅游历了德颂拉特的每一个角落，更是在713号枢纽中完成了数不清的科研项目，其中一项以融合各个种族基因创造新个体的“奇美拉计划”是缪拉最得意的成果，她使用这项技术为自己创造了几个女儿，虽然这些女儿都不太喜欢缪拉这个母亲就是了。"
     #筑基者(没做)
 SHA_1_APDF_DES:0 "香格里拉的高级工程师，能够指挥一群无人机维修队，负责大型机械的维护与修理工作，实干且可靠。"
 #翼神教国
 weiliya:0 "薇莉娅"
 WIM_weiliya_APDF_DES:0 "翼神教国大主教，天翼族。翼神的传说在法兰旧帝国时期的洛维尼亚地区就已经广泛流传：“拥有无穷智慧的翼神与她的天使对旧文明降下神罚，并以她们的外貌创造了现在的生命，而天翼族是最接近天使的种族。”薇莉娅与她的同胞们对这则传说深信不疑，在此基础上建立的翼神教自然也成为许多天翼族一生的信仰。而对于其他种族而言，这种信仰过于危险，在旧帝国时期，信仰翼神的天翼族都将被处以极刑。旧帝国毁灭后，作为帝国治下最大的人类国家的洛维尼亚自然也继承了旧帝国的思想与法律，洛维尼亚境内的天翼族被驱赶至在当时荒无人烟的中洲。随着信仰，种族间的矛盾愈发激烈，洛维尼亚的天翼族们在一名拥有纯白家族血统的天翼族少女的领导下发动了史无前例的独立战争（又称“洛维尼亚分裂战争”或“洛维尼亚皇位争夺战争”，这场战争不仅影响了洛维尼亚，还影响了当时的东方王朝），翼神教国就此建立。薇莉娅坚信自己能够带领同胞们反攻洛维尼亚，夺取皇位并将翼神信仰传播至整个德颂拉特，为迎接翼神的下一次到来做好准备。"
 fanluntingna:0 "范伦汀娜"
 WIM_fanluntingna_APDF_DES:0 "翼神教国神官，天翼族。平时会把翅膀藏起来，只有在祈祷时才会张开双翼。"
 xitelei:0 "希特蕾"
 WIM_xitelei_APDF_DES:0 "翼神教国陆军指挥官，天翼族。“温文尔雅”的教廷骑士，大主教的得力助手，对于翼神的传说有一套自己独特的理解。"
 kaluoer:0 "卡洛儿"
 WIM_kaluoer_APDF_DES:0 "翼神教国海军指挥官，天翼族。喜欢恶作剧的调皮少女，发明了许多阴险的小玩意。"
  #科尔拉斯
 gelinna:0 "格林娜"
 peiliya:0 "佩莉娅"
 RAS_gelinna_APDF_DES:0 "科尔拉斯的双子指挥官，人类。据说这对姐妹在一起时能够做出极其复杂的公式运算，使火炮的精准度大大提高。"
   #托梅尼亚王国
 gemila:0 "格米拉"
 TOM_gemila_APDF_DES:0 "托梅尼亚王国女王，亚人类。带领着托梅尼亚军队抵御里斯亚尼亚的进攻，但面对里军强大的攻势还是略感疲惫。"
    #里斯亚尼亚
 xila:0 "席拉"
 RIE_xila_APDF_DES:0 "里斯亚尼亚元帅兼领袖，人类。虽然席拉成为了实际上的领袖之后就一直有人对她不满，但她通过强硬的手段清除了绝大部分反对她的人。现在的里斯亚尼亚成为了一个军国主义国家，席拉的扩张为里斯亚尼亚带来了大量的领土，同时也产生了大量的反叛势力。如何面对内忧和外患是里斯亚尼亚今后的抉择。"
 modaisiti:0 "摩黛丝提"
 RIE_modaisiti_APDF_DES:0 "里斯亚尼亚陆军将领，人类。沉默寡言，曾参加过国内镇压起义军的行动，对外界的一切漠不关心，只顾完成指挥部交给自己的任务。"
 aofeiliya:0 "奥菲莉娅"
 RIE_aofeiliya_APDF_DES:0 "里斯亚尼亚海军指挥官，人类。对空军和海军都有一定的研究，曾是军事学院的教师。"
 naemi:0 "娜娥迷"
 RIE_naemi_APDF_DES:0 "里斯亚尼亚海军指挥官，人类。娜娥迷精通大舰队作战，善于指挥大舰队以势不可挡的架势击溃敌人。由于原海军大臣赵雅奏的叛逃，导致里斯亚尼亚的海军直到战争前夕依然士气低迷，于是娜娥迷直接代替赵雅奏接手了海军大权并稳定了海军内部的声音。不过里斯亚尼亚海军主要是在南部，对陆军的北上计划没有太大的帮助，因此在秩序战争前期并不活跃。"
 aimi:0 "艾咪"
 RIE_aimi_APDF_DES:0 "里斯亚尼亚陆军指挥官，人类。听从指挥部的命令指挥军队，是席拉的助手。"
 #神洲
 zhuqiu:0 "朱秋"
 DIV_zhuqiu_APDF_DES:0 "神州领袖，神州禁卫军总指挥，亡灵族。禁卫军是独立于中央军和边境四军团的存在，人员都经过重重选拔，有多大规模尚不明确，外界只是知道禁卫军主要活动范围在神州各大城市附近，传说是“天子”的御用军队，不过这终究只是传说罢了。作为最经常出现在大众面前的禁卫军人员，神州民众对她最大的印象可能就是雷厉风行和铁面无私。关于身为亡灵族的朱秋是怎么成为神州的最高统治者的？恐怕只能在古老的藏书阁中寻找答案，而朱秋自己也已经把这过往烂在了心里。现在的她只有一个职责，就是用自己不老不死的身体与无穷无尽的寿命守卫神州的安宁。"
 zhangxikai:0 "张希凯"
 DIV_zhangxikai_APDF_DES:0 "神州中央军元帅，人类。作为中央军的元帅，张希凯的职责乃是重中之重。神州中部地区作为皇室重地，无论是军事还是人事方面，都要做到几乎严丝无缝。正是有像张希凯这类忠诚的将军，才可保神州经历千年而不被撼动。"
 anbai:0 "安白"
 DIV_anbai_APDF_DES:0 "神州工程专家，东国鬼族。擅长结构研究的少女，设计了多款实用的坦克型号，为神州的国防工业做出了杰出贡献。"
 wanghuacai:0 "汪花彩"
 DIV_wanghuacai_APDF_DES:0 "神州中央国防科技学院院长，人类。负责调度陆军装备的列装与研发工作，她的研究团队在与升阳帝国的战争中发挥着重要作用。"
 huangbeiya:0 "黄贝娅"
 DIV_huangbeiya_APDF_DES:0 "神州陆军将领。吕治岚的参谋长，顽强而有活力。虽不能独自一人指挥军队，但是个十分优秀的助手。"
 lvzhilan:0 "吕治岚"
 DIV_lvzhilan_APDF_DES:0 "神州第一位亚人类元帅，性格鲁莽却又平易近人。曾亲自为前线军队筹备物资，深受基层士兵爱戴。"
 suluona:0 "苏洛娜"
 DIV_suluona_APDF_DES:0 "神州陆军将领。曾因与阳洁羽交好而遭到革职流放，后在与升阳帝国的战争中被重新起用。成功在贡觉、福泉、赤河战役中击败升阳军，多次营救在后方作战的民兵游击队并撤退。战争结束后晋升为神州元帅。"
 #汪花彩
 DIV_1_APDF_DES:0 "神州海军指挥官，神州海军指挥学院院长，人类。擅长指挥多个舰队进行机动作战，注重海军后勤理论，在与升阳帝国的战争中策划了多场针对其补给航线的行动。"
     #帕真
 DIV_9_APDF_DES:0 "神州北洋舰队指挥官，亚人类。从小在北方长大，与林芳是要好的朋友，喜爱看书。"
  #西卫致远军
  zhanghaigui:0 "张海桂"
 ZHI_zhanghaigui_APDF_DES:0 "神州西卫致远军统领，人类。张海桂曾前往莫比斯国家军事学院学习，作战方式和行为举止都有一层厚厚的莫比斯色彩，但这并不影响她为神州的安定做出贡献。致远军以白虎为标志，镇守神州西部边境线，是神州和西部大陆最主要的连接点。曾经的致远军能够纵横中洲靠的就是快速的压倒性攻势，而了解西洲大陆作战风格的张海桂在原先的理论基础上进行改进，让致远军拥有更强大的突击应对力量。"
 guqin:0 "孤晴"
 ZHI_guqin_APDF_DES:0 "神州西卫致远军海军指挥官，亚人类。带领西卫海军巡视神州边界，堤防西方大陆军队的动向。" 
 #北卫凛冬军
  yuanfupei:0 "袁芙茜"
 WEI_yuanfupei_APDF_DES:0 "神州北卫凛冬军统领，人类。凛冬军以玄武为标志，镇守神州北部海岸线和神州外岛，同时监视在西北部的安息之国。作为一方统领，袁芙茜深知神州外部并不平稳，一股强大的浪潮即将来临。但北方的寒冷练就了强大的凛冬军，滚滚的铁甲洪流和破冰前行的凛冬海军会证明自己的强大。" 
  guilin:0 "桂琳"
 WEI_guilin_APDF_DES:0 "神州北卫凛冬军炮兵指挥官，人类。入伍前是一位探险家，现在是凛冬军的炮兵将领，负责镇守神州北部边界。" 
  linfang:0 "林芳"
 WEI_linfang_APDF_DES:0 "神州北卫凛冬军海军指挥官，人类。并不十分健谈，但作战指挥时情绪会变得十分高昂。喜欢坐在舰桥上看着窗外下着的细雪。" 
   #南卫安平军
  anjingzhi:0 "安靖之"
 NAN_anjingzhi_APDF_DES:0 "神州南卫安平军陆军指挥官，西洲裔，人类。安靖之对火炮的战术理解使她在一众军官中脱颖而出，现在的她隶属于神州南卫安平军，可在需要的时刻调动精锐炮兵部队支援致远军和定洋军。"
 xiali:0 "夏莉"
 NAN_xiali_APDF_DES:0 "神州陆军将领。作战勇猛，为人正直。对一切事物充满好奇，帮助过朱秋撰写游记。" 
  #东卫定洋军
  shaoxuan:0 "邵宣"
 ONG_shaoxuan_APDF_DES:0 "神州东卫定洋军统领，人类。定洋军以青龙为标志，镇守神州东部的海岸线。定洋军的统领邵宣曾带领定洋军击退企图叛乱的阳洁羽等人，平定了东部的叛乱。曾以为此事就告一段落，可谁知升阳帝国的出现又打破了和平的现状。面对拥有未知装备的升阳帝国，邵宣和她的定洋军已经做好了准备誓死捍卫神州边境的安全。" 
  yamu:0 "雅木"
 ONG_yamu_APDF_DES:0 "神州东卫定洋军陆军指挥官，人类。曾前往洛维尼亚皇家军事学院学习，归国之后担任装甲兵参谋调往定洋军。在以海军为主要战斗力量的定洋军中，雅木对于发展装甲部队的提议经常会被忽视，同僚曾劝她跳槽到重视陆军的凛冬军或致远军，但她都一一谢绝了，在她眼里，装甲兵是现代战争不可或缺的一部分，装甲力量薄弱的定洋军更需要发展装甲部队。在雅木不懈的努力下，定洋军装甲部队规模慢慢的有了起色，同时还总结出一套后勤保障体系，让定洋军的后勤系统变得更加稳固。" 
  qinyun:0 "青云"
 ONG_qinyun_APDF_DES:0 "神州东卫定洋军海军指挥官，人类。曾参与了平定阳洁羽乱党的镇压行动。主张战舰航母协同作战，认为航母将与战列舰一样成为未来海战不可或缺的力量。" 
 chenlingjing:0 "陈玲静"
 ONG_chenlingjing_APDF_DES:0 "神州东卫定洋军航空指挥官，人类。与青云是要好的朋友，两人在对航母的运用上有着不同的看法。陈玲静认为航母能代替战列舰成为海上的战斗主力，提议军械部应当将研发重点放在小型舰艇与舰载飞机上。" 
    #安阳国
  qingji:0 "青姬"
 ANY_qingji_APDF_DES:0 "安阳国战士，亚人类。交界群岛原住民，为了更加合群而佩戴般若面具。"
 mieyazi:0 "咩亚子"
 ANY_mieyazi_APDF_DES:0 "安阳国偶像，人类。野奈雅的妹妹，梦想是能够前往神州大陆的舞台上演出。" 
 xiaodie:0 "咲蝶"
 ANY_xiaodie_APDF_DES:0 "安阳国海军将领，东国妖族。擅长通灵的年轻妖族，会使用火焰法术协助战斗。" 
     #洛神港
  jieyi:0 "洁依"
 GOD_jieyi_APDF_DES:0 "神州洛神港最高管理者，东国鬼族。与其他鬼族血红色的眼睛不同，洁依拥有淡蓝色的眼睛，这使得她被自己的家乡抛弃，幸运的是，她被洛神港商队捡到并抚养长大。在洛神港熏陶长大的洁依展现出了出众的商业才能和指挥能力，她靠着实力一步步的走到了今天的位置。曾经被视为不详之兆的她用自己的行动赢得了尊重，同时也背负着责任。连通各国的洛神港商业航线是神州与外界交流的重要渠道，同时也是神州海上补给的重要枢纽。如何安然度过即将到来的风暴，是洁依和洛神港将要面临的挑战。"
 binhui:0 "彬惠"
 GOD_binhui_APDF_DES:0 "神州洛神港管理者，亚人类。在繁忙的洛神港中协助洁依管理船只的统计和进出，是洁依的左右手。"
  #斯塔王国
  #斯卡五世
 STA_sitawushi_APDF_DES:0 "斯塔王国女王，亚人类。善良可爱，娇柔无害，这是大多数人们看到她的第一印象。如果是作为养眼的花瓶，那么斯卡五世绝对可以胜任，但作为一名女王，她并没有多少统治者的觉悟，这导致整个国家处于停滞不前的状态，而当莫军攻陷斯塔王国首都后，她的人生便发生了翻天覆地的变化。一夜之间，斯卡五世从斯塔女王跌落为亡国之奴，在被莫比斯羁押期间，她被当许多莫比斯学者采访，内容是“你是如何把国家治理成这样的？”。当莫军占领由洛维尼亚控制的斯塔东部时，元首决定让她回到重新建立的斯塔王国，成为莫比斯安抚斯塔民众的精神领袖。这对于斯塔五世来说，是一个新的机遇，她成功不负众望的发明了一种可以长期保存的速溶奶茶，这种被称为“斯卡奶茶”的方便奶茶迅速成为前线将士补充体力，恢复士气的绝佳饮品，让她们可以无时不刻感受斯塔女王的关爱。"
  #珍妮玛珏望 
 STA_zhennimajuewang_APDF_DES:0 "斯塔宫廷里的弄臣，亚人类。总是嬉皮笑脸的与她人交流，举止中无时不刻透露着滑稽，或许正是这种愚蠢的模样才使得她没有被视为威胁吧。" 
  #瑞贝卡
 STA_ruibeika_APDF_DES:0 "斯塔贵族将领，亚人类。瑞贝卡的家族掌管着斯塔的经济，显然她们并没有做好。" 
   #赫迪兰 
 STA_hedilan_APDF_DES:0 "斯塔陆军指挥官，斯塔东方集团军总司令，亚人类。比起处理军中的复杂事务，赫迪兰更喜欢将时间放在研究军事战术上，与莉乃是要好的朋友。" 
    #江雨 
 STA_jiangyu_APDF_DES:0 "斯塔王国将领，江雨的妹妹。在斯塔王国濒临覆灭之际宁死不降，所带领的自卫队成为了斯塔最后的抵抗力量，后下落不明。" 
    #艾米莎 
 STA_aimisha_APDF_DES:0 "斯塔王国的战士，斯卡五世的亲卫队长，亚人类，东国裔。在战争前夕，她受命前往斯塔王国东部，防御洛维尼亚的进攻。当洛维尼亚的军队越过边境线时，她不顾一切率领自卫队主动出击，最终身陷囹圄，成为洛维尼亚骑士团的俘虏。对于艾米莎而言，最大的遗憾就是没有击败可恶的贵族骑士们。不过她怎么也想不到，在洛维尼亚起义军的帮助下，用不了多长时间她就能再次与贵族骑士们决一死战。"  
