      #指挥官凯露
 5_1_APDF_DES:0 "来自于异世界的神秘猫耳少女，她随身携带一本魔法书，能够释放威力强大的爆裂魔法。没有人知道她来自哪里，也没有人知道她要去往何方，但是在周游世界的过程中，凯露成功凭借自己卓越的能力，为这个世界增添了一笔别样的色彩。" 
