 mag_shadow.1.a:0 "暗影已经开始涌动······"

 mag_shadow.2.t:0 "雷雨"
 mag_shadow.2.d:0 "奈尔嘉德并非算无遗策，方舟骑士团的突袭远在她的预料之外，针对南方各省发生叛乱的预案作废了——自己手下这帮饭桶于什么吃的，敌人冲到眼前了才汇报情况。眼下的局势已经很明显了，自己和审判庭已经被反贼拉到了同一条起跑线上，军事政变来的太突然，索性天平尚未完全倾斜，她还有法兰的青年近卫军可以调动……\n\n借着同盟领袖的名义，艾米莉调集剩下的自卫队和近卫军组织防御，同时通知了审判长，要求她收集叛变部队的一切情报，并且赶紧抽调审判庭卫队平叛。\n\n战火烧到了卡洛克托娅市区。特务与警察在路口挨个检查通行车辆，防止共和派的骨干逃出首都，同时镇压游行的魔法少女。多亏了艾米莉同法兰参谋本部间建立的专线，周围的卫成部队响应迅速，仅用一个下午便将冲入首都的孤军包围。并查明了骑士团诡异行为的原因——她们并非按军部的意思进行轮换，而是带着伪造的假文件前来。\n\n……阳光逐渐暗淡，枪炮与魔法轰击的巨响掩盖住了隆隆雷声。士兵们在泥泞的大地与她们的同胞自相残杀，警察与特务在昏暗的街道上与市民互殴。\n\n对于想要靠政变上台的共和派来说，时间比枪杆子还要宝贵。一天的交战已经足以奠定结局——方舟骑士团终究没有能力创造奇迹，被其他部队层层包围、（）爬上街垒，想着动员民众对抗军队，却被一发流弹了结了性命：（）在私宅中被逮捕、最后同审判庭的执行者消失在了一场绚烂的爆炸中。其他骨干力量被尽数打进监狱，但还是有人靠自杀躲过了屈辱的审判。\n\n这次的军事政变，以反对派的彻底失败告终。\n\n暴雨很快洗去了炉火旁的血污，只有远处被震碎的玻璃还在记录着昨天的战斗。一段急促的铃声响过，收音机里传来了僵硬的声音："
 mag_shadow.2.a:0 "“为了全体魔法少女的未来与法兰的复兴，奈尔嘉德陛下决定于今日加冕称帝……”"

 SLI: "法兰护国军"

 mag.53.t:0 "南方叛乱"
 mag.53.d:0 "共和派的民兵已经控制了南方，现在她们自称“护国军”，宣称要推翻女皇的统治。"
 mag.53.a:0 "北伐，北伐！"
 mag.53.b:0 "为了女皇陛下，扫清叛匪！"

 mag.54.t:0 "护国军的旗帜"
 mag.54.d:0 "奈尔嘉德的统治必须被终结"
 mag.54.a:0 "为了法兰的未来，前进！"