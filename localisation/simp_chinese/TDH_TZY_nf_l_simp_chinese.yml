l_simp_chinese:
 tzy.1.t:0"双奇战争"世界格局的大动荡意味着机遇与挑战 我们要把握机会
 tzy.1.d:0"奇恩将于4636年七月发起进攻"虽然双方纸面数据相近 但大多人认为优势在我
 tzy.1.a:0"我们会让奇拉获得真正的自由"解放他们
 tzy.1.b:0"我们做好了一些准备"会战兵力是八十万对六十万
 tzy.2.t:0"奇恩帝国提出谈判"战与和的两手准备
 tzy.2.d:0"经过一系列战役奇拉元气大伤 军队损失惨重"
 tzy.2.a:0"前往谈判"战争是政治的衍生 如果我们可以在谈判桌上取得足够的利益 那么战争就不会继续
 tzy.2.b:0"我们可不会妥协"
 tzy.3.t:0"奇拉同意谈判"
 tzy.3.d:0"对方确认同意谈判"
 tzy.3.a:0"开始谈判"
 tzy.3.b:0"强硬要求割地赔款"
 tzy.7.t:0"奇拉拒绝谈判"
 tzy.7.d:0"对方拒绝谈判"
 tzy.7.a:0"那就毁灭吧"谈判无果 继续进军
 tzy.4.t:0"古西布拉"
 tzy.4.d:0"要求"
 tzy.4.a:0"吞并"
 tzy.4.b:0"傀儡"
 tzy.5.t:0"奇拉"
 tzy.5.d:0"要求"
 tzy.5.a:0"奇拉的部分土地和赔款 重组政府"现在奇拉已经战败 我们需要考虑这片土地的命运
 tzy.5.b:0"吞并"直接掌控或许是最好的选择
 tzy.6.t:0"羽翼军团"
 tzy.6.d:0"要求"
 tzy.6.a:0"部分土地和只要赔款"
 tzy.6.b:0"吞并"我们吞并了这块领土 并建立了统治
 TZY_reparations_1_tt:0"可能会有不好的影响（后续回做）"
 tzy.8.t:0"奇恩帝国希望合作"
 tzy.8.d:0"我们有共同的敌人"
 tzy.8.a:0"可以"多一个盟友总比多一个敌人好
 tzy.8.b:0"不好"
 tzy.9.t:0"法兰同意合作"
 tzy.9.d:0""
 tzy.9.a:0"太好了"
 tzy.10.t:0"法兰拒绝合作"
 tzy.10.d:0""
 tzy.10.a:0"可惜了"
 tzy.11.t:0"旧殖民者命运"
 tzy.11.d:0"殖民者压榨着我国的利益"凡失去的 必将归来 凡夺取的 必将偿还
 tzy.11.a:0"全部没收财产赶出去"
 tzy.11.d:0"全部没收财产处于死刑"
