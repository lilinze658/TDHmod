 #国策
 SHE_focus_1:"重建总指挥部"
 SHE_focus_1_desc:"经过重重阻难，我们终于在这里站稳了脚跟，原先的管理体系已经逐渐失衡，我们需要一个强有力的新政府。"
 SHE_focus_102:"团结在统领身边"
 SHE_focus_102_desc:"鬼族和亚人的原住民对我们并不感冒，我们在这片土地上并不占绝对优势，为了防止帝国中道崩阻，我们必须牢牢的团结在统领阳洁羽的身边。"
 SHE_focus_103:"吸纳鬼族"
 SHE_focus_103_desc:"鬼族其实相当好对付，在我们来之前她们的人民衣不足食，只有最强的鬼族才能生存下去，在这种环境的长期熏陶下鬼族变的异常嗜血。也就是说只要我们能满足她们的衣食住行，带着她们上战场，她们肯定很乐意支持我们。"
 SHE_focus_104:"完善亚人保护政策"
 SHE_focus_104_desc:"曾经这片土地上，亚人长期受到鬼族欺压，每天都有亚人死在鬼族的手下。为了保护珍贵的劳动力，我们颁布了亚人保护草案，这是历史的一步，不过还远远不够，作为帝国最主要的人口，她们的权利必须得到完整的保护。"
 SHE_focus_105:"鬼族入军"
 SHE_focus_105_desc:"鬼族是天生的战士，她们的身体素质远超常人，一个训练过的鬼族实力可以对抗五名人类士兵，如此优秀的兵源不加入军队就是浪费她们的才能，反正她们也不会杀人以外的其他事了。"
 SHE_focus_106:"帝国的基石"
 SHE_focus_106_desc:"在这片土地，亚人是绝对的主体民族，她们的人口占总人口的百分之八十，她们承担着帝国全部的后勤，作为帝国的大头兵为帝国征战四方，立下如此功劳的亚人应该有一个属于她们的合理的地位。"
 SHE_focus_107:"重拾武士道"
 SHE_focus_107_desc:"工业化曾经彻底改变了安阳国，安阳国内盛极一时的武士道因此而衰落，那是时代的选择。但现如今，随着大量鬼族加入军队，那些乱糟糟的家伙正在逐步破坏我们的军队，武士道是现在最好的约束她们的手段，强调对领袖的忠诚和对个人武力的崇拜，相信这样可以让她们成为优秀的职业军队。"
 SHE_focus_108:"奖励生育"
 SHE_focus_108_desc:"若想夺回神州，一只庞大的军队是不可缺少的，但目前我们的人口相对神州来说严重不足，只要开战，我们一定会被神州庞大的人力榨干，现如今保障充足的人口是现在的当务之急。"
 SHE_focus_109:"文化融合"
 SHE_focus_109_desc:"我们的人民和军队一直没有一个共同的目标，没有统一的文化和主体的人口，甚至我们本身都是外来者。只有将我们塑造成一个整体，将我们所有的共同点和优点熔铸成新的文化才能给她们一个目标，让她们知道升阳是所有人的升阳。"
 
