SHE_insurrection:0 "烈日联盟" 
 SHE_1_decision:0 "突袭拉博提达姆成功"
 SHE_1_decision_desc:0 "拉博提达姆地势平坦易攻难守，这里或许是西洲战略不错的起始点"
 SHE_2_decision:0 "派遣第一先遣军"
 SHE_2_decision_desc:0 "我们已经成功攻下拉博提达姆作为西洲的立足之地，现在我们因派遣军团扩大在西洲的战果"
 SHE_3_decision:0 "增援第二先遣军"
 SHE_3_decision_desc:0 "西洲国家的抵抗挫败我们的推进计划，现在我们要派遣新的有生力量"
 SHE_4_decision:0 "整合西洲北部"
 SHE_4_decision_desc:0 "我们夺取了西洲北部的土地，是时候加深我们对它的统治了"
 SHE_5_decision:0 "整合西洲南部"
 SHE_5_decision_desc:0 "西洲南部的广大国家臣服在了我们的铁蹄下，现在需要确保他们的忠诚"
 SHE_11_decision:0 "与羽翼协商"
 SHE_11_decision_desc:0 "羽翼军团向来与西洲国家有些许矛盾，我们可以加以利用让羽翼成为我们在西洲上的一个帮手"
 SHE_2_decision_category:0 "神洲战略"
 SHE_2_decision_category_desc:0 "这里是我曾经的故土，而今我将归来夺回一切"
 SHE_6_decision:0 "突袭安阳"
 SHE_6_decision_desc:0 "攻下安阳是神州战略的第一步，它将为我们提供一个踏板"
 SHE_7_decision:0 "组建神洲先遣军"
 SHE_7_decision_desc:0 "而今安阳已经攻下,通向神州的大门已然打开是时候组建一个专门的集团军来应对神州"
 SHE_8_decision:0 "整合安阳"
 SHE_8_decision_desc:0 "距攻下安阳已有些时日,是时候扫清障碍把他们整合进我们的领土了"
 SHE_9_decision:0 "天都战役"
 SHE_9_decision_desc:0 "历经苦战,来到天都,这里是神州的心脏,只要拿下天都神州必败"
 SHE_10_decision:0 "转攻为守"
 SHE_10_decision_desc:0 "敌军的顽强超过了我们的预料,天都战役的失败让我们损兵折将,我们需要收缩战线"

